<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VerifDigi Pro - Night Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>

    <style>
        body { background-color: #0b1120; color: #e2e8f0; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        
        .glass-header { background: rgba(11, 17, 32, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #1e293b; }
        .card-custom { background-color: #111827; border: 1px solid #1e293b; border-radius: 1.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .card-stats { background: linear-gradient(135deg, #0284c7, #1e3a8a); border: none; color: white; }
        
        .nav-pills .nav-link { color: #94a3b8; border-radius: 1rem; padding: 10px 20px; font-weight: 600; transition: all 0.3s; cursor: pointer; border: none; background: transparent; }
        .nav-pills .nav-link:hover { background-color: #1e293b; color: #f8fafc; }
        .nav-pills .nav-link.active { background-color: #2563eb; color: white; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4); }
        
        .form-control, .form-select { background-color: #0f172a; border: 1px solid #334155; color: #f8fafc; border-radius: 1rem; padding: 12px 16px; }
        .form-control:focus, .form-select:focus { background-color: #1e293b; border-color: #3b82f6; color: white; box-shadow: 0 0 0 0.25rem rgba(59, 130, 246, 0.25); }
        .form-select { background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%2394a3b8' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e"); }
        
        .table { color: #cbd5e1; }
        .table-dark { background-color: transparent; }
        .table-dark th { background-color: #0f172a; border-bottom: 2px solid #334155; color: #94a3b8; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; font-size: 0.8rem; }
        .table-dark td { background-color: #111827; border-bottom: 1px solid #1e293b; vertical-align: middle; }
        .table-hover>tbody>tr:hover>td { background-color: #1e293b; color: white; }

        .btn-brand { background-color: #2563eb; border: none; color: white; border-radius: 1rem; padding: 12px 24px; font-weight: 700; transition: all 0.2s; }
        .btn-brand:hover { background-color: #1d4ed8; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(37, 99, 235, 0.4); color: white;}
        .btn-light-custom { background-color: #1e293b; color: #e2e8f0; border: none; border-radius: 1rem; padding: 12px 24px; font-weight: 700; }
        .btn-light-custom:hover { background-color: #334155; color: white; }

        .badge-brand { background-color: #1e3a8a; color: #93c5fd; padding: 6px 12px; border-radius: 8px; border: 1px solid #1e40af; font-size: 0.75rem; }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
        .spinner-border { width: 3rem; height: 3rem; border-width: 0.3em; }

        /* Efek Admin Emas */
        .admin-btn { color: #fbbf24; border-color: #fbbf24; }
        .admin-btn:hover { background-color: #fbbf24; color: #0f172a; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxuT879SUELxXGkuG-yZe0dBZD66dU4KNZSr8aI0z2wahyF4yw0xX2ZFwWplJOscLg4/exec"; 

        const { useState, useEffect, useRef } = React;

        const ToastMessage = ({ message, type, onClose }) => {
            useEffect(() => { const timer = setTimeout(onClose, 6000); return () => clearTimeout(timer); }, [onClose]);
            const bgClass = type === 'error' ? 'bg-danger' : type === 'success' ? 'bg-success' : 'bg-warning text-dark';
            const icon = type === 'error' ? 'fa-triangle-exclamation' : type === 'success' ? 'fa-check-circle' : 'fa-info-circle';
            
            return (
                <div className={`toast show align-items-center text-white ${bgClass} border-0 mb-3 shadow-lg`} role="alert">
                    <div className="d-flex">
                        <div className="toast-body d-flex align-items-center gap-3 fw-bold">
                            <i className={`fas ${icon} fs-4`}></i> {message}
                        </div>
                        <button type="button" className="btn-close btn-close-white me-2 m-auto" onClick={onClose}></button>
                    </div>
                </div>
            );
        };

        function App() {
            const [activeTab, setActiveTab] = useState('upload'); 
            const [showSettings, setShowSettings] = useState(false);
            const [backendUrl, setBackendUrl] = useState(localStorage.getItem('VERIFDIGI_BACKEND_URL') || GAS_WEB_APP_URL);
            const [tempUrl, setTempUrl] = useState(backendUrl);

            // STATE ADMIN
            const [isAdmin, setIsAdmin] = useState(false);
            const [editModal, setEditModal] = useState(null); // Menyimpan record yang sedang diedit

            // STATE UPLOAD & AI
            const [uploadState, setUploadState] = useState('idle'); 
            const [processedImages, setProcessedImages] = useState([]); 
            const [extractedData, setExtractedData] = useState({ sekolah: '', bulan: '', tahun: '', siswa: [] });
            
            // STATE DATA
            const [records, setRecords] = useState([]);
            const [loadingData, setLoadingData] = useState(false);
            const [toast, setToast] = useState(null);
            
            // STATE FILTER
            const [filterPendamping, setFilterPendamping] = useState('');
            const [filterBentuk, setFilterBentuk] = useState('');
            const [filterTingkat, setFilterTingkat] = useState('');
            const [searchQuery, setSearchQuery] = useState('');
            const [searchArsip, setSearchArsip] = useState('');

            const fileInputRef = useRef(null);
            const showToast = (message, type = 'success') => setToast({ message, type });

            useEffect(() => {
                if (activeTab !== 'upload' && records.length === 0) fetchData();
            }, [activeTab]);

            // ==========================================
            // ADMIN LOGIN LOGIC
            // ==========================================
            const handleAdminToggle = () => {
                if (isAdmin) {
                    setIsAdmin(false);
                    showToast('Admin Logout berhasil.', 'info');
                } else {
                    const password = window.prompt("Masukkan Password Akses Admin:");
                    if (password === "admin123") {
                        setIsAdmin(true);
                        showToast('Login Admin Berhasil! Fitur Hapus dan Edit diaktifkan.', 'success');
                    } else if (password !== null) {
                        showToast('Password Salah!', 'error');
                    }
                }
            };

            // ==========================================
            // ADMIN CRUD LOGIC (EDIT & DELETE)
            // ==========================================
            const handleDelete = async (timestamp) => {
                if (!window.confirm("Peringatan: Anda yakin ingin menghapus data siswa ini secara permanen dari Database?")) return;
                
                showToast("Sedang menghapus data...", "info");
                try {
                    const res = await fetch(backendUrl, { 
                        method: 'POST', 
                        body: JSON.stringify({ action: 'delete', timestamp: timestamp }),
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                    });
                    const resData = await res.json();
                    if (resData.status === 'success') {
                        showToast(resData.message, 'success');
                        fetchData(); // Refresh table
                    } else {
                        throw new Error(resData.message);
                    }
                } catch (e) {
                    showToast("Gagal menghapus: " + e.message, "error");
                }
            };

            const handleUpdateSubmit = async (e) => {
                e.preventDefault();
                showToast("Menyimpan pembaruan data...", "info");
                try {
                    const payload = { action: 'update', ...editModal };
                    const res = await fetch(backendUrl, { 
                        method: 'POST', 
                        body: JSON.stringify(payload),
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                    });
                    const resData = await res.json();
                    if (resData.status === 'success') {
                        showToast(resData.message, 'success');
                        setEditModal(null);
                        fetchData();
                    } else {
                        throw new Error(resData.message);
                    }
                } catch (e) {
                    showToast("Gagal mengupdate: " + e.message, "error");
                }
            };

            // ==========================================
            // MULTI-IMAGE OCR & PROCESSING
            // ==========================================
            const handleFileChange = async (e) => {
                try {
                    const files = Array.from(e.target.files || []);
                    if (files.length === 0) return;
                    if (!backendUrl) return showToast('Masukkan URL Google Apps Script di Pengaturan!', 'error');
                    
                    setUploadState('processing_image');
                    const base64Array = [];

                    for (let file of files) {
                        const base64 = await processSingleImage(file);
                        base64Array.push(base64);
                    }

                    if (base64Array.length === 0) throw new Error("Gagal membaca file");

                    setProcessedImages(base64Array);
                    extractTextFromMultipleImages(base64Array);
                } catch (error) {
                    setUploadState('idle');
                    showToast('Gagal memproses gambar: ' + error.message, 'error');
                }
            };

            const processSingleImage = (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            try {
                                const canvas = document.createElement('canvas');
                                const ctx = canvas.getContext('2d');
                                const maxWidth = 1800; 
                                let width = img.width, height = img.height;
                                if (width > maxWidth) { height = Math.round((height * maxWidth) / width); width = maxWidth; }
                                canvas.width = width; canvas.height = height;
                                ctx.filter = 'grayscale(100%) contrast(160%) brightness(105%)'; 
                                ctx.drawImage(img, 0, 0, width, height);
                                resolve(canvas.toDataURL('image/jpeg', 0.8)); 
                            } catch (e) { reject(e); }
                        };
                        img.onerror = reject;
                        img.src = event.target.result;
                    };
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            };

            const extractTextFromMultipleImages = async (base64Array) => {
                setUploadState('extracting');
                try {
                    const cleanBase64Array = base64Array.map(img => img.split(',')[1]);
                    
                    const res = await fetch(backendUrl, {
                        method: 'POST', 
                        body: JSON.stringify({ action: 'extract_multiple', images: cleanBase64Array }), 
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                    });
                    
                    const textResponse = await res.text();
                    let data;
                    try {
                        data = JSON.parse(textResponse);
                    } catch(e) {
                        throw new Error("Server mengembalikan format yang salah: " + textResponse.substring(0, 150));
                    }

                    if (data.status === 'success') {
                        const safeData = {
                            sekolah: data.data?.sekolah || 'Tidak Terdeteksi',
                            bulan: data.data?.bulan || '-',
                            tahun: data.data?.tahun || '-',
                            siswa: Array.isArray(data.data?.siswa) ? data.data.siswa : [] 
                        };
                        setExtractedData(safeData);
                        setUploadState('form');
                        showToast(`Berhasil membaca ${safeData.siswa.length} baris data dari foto!`, 'success');
                    } else {
                        throw new Error(data.message || "Error dari AI");
                    }
                } catch (err) {
                    console.error(err);
                    showToast('Gagal terhubung ke AI: ' + err.message, 'error');
                    setUploadState('idle');
                }
            };

            const handleSave = async (e) => {
                e.preventDefault();
                setUploadState('saving');

                try {
                    if (!window.jspdf || !window.jspdf.jsPDF) throw new Error("Library PDF gagal dimuat.");

                    const doc = new window.jspdf.jsPDF('p', 'mm', 'a4');
                    processedImages.forEach((imgBase64, index) => {
                        if (index > 0) doc.addPage();
                        const imgProps = doc.getImageProperties(imgBase64);
                        const pdfWidth = doc.internal.pageSize.getWidth();
                        const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
                        doc.addImage(imgBase64, 'JPEG', 0, 0, pdfWidth, pdfHeight);
                    });

                    const pdfBase64Data = doc.output('datauristring').split(',')[1];
                    const payload = { action: 'save', pdfBase64: pdfBase64Data, sekolah: extractedData.sekolah, bulan: extractedData.bulan, tahun: extractedData.tahun, siswa: extractedData.siswa || [] };
                    
                    const res = await fetch(backendUrl, { 
                        method: 'POST', body: JSON.stringify(payload), headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                    });
                    
                    const textResponse = await res.text();
                    let resData;
                    try { resData = JSON.parse(textResponse); } 
                    catch(e) { throw new Error("Server Error: " + textResponse.substring(0,100)); }
                    
                    if (resData.status !== 'success') throw new Error(resData.message);
                    
                    fetchData(); 
                    setUploadState('success');
                    
                    // Notifikasi khusus jika ada data duplikat yang dilewati oleh Backend
                    if (resData.message) {
                        showToast(resData.message, 'success');
                    } else {
                        showToast('Data berhasil masuk ke Spreadsheet dan PDF ke Drive!', 'success');
                    }
                    
                } catch (err) {
                    console.error(err);
                    showToast('Gagal menyimpan: ' + err.message, 'error');
                    setUploadState('form');
                }
            };

            const fetchData = async () => {
                if (!backendUrl) return;
                setLoadingData(true);
                try {
                    const res = await fetch(`${backendUrl}?action=getRecords`);
                    const result = await res.json();
                    if (result.status === 'success') {
                        setRecords(Array.isArray(result.data) ? result.data : []);
                    } else showToast("Gagal memuat: " + result.message, 'error');
                } catch (error) { 
                    showToast("Gagal memuat database dari Server", 'error'); 
                } finally { setLoadingData(false); }
            };

            const resetForm = () => { setUploadState('idle'); setExtractedData({ sekolah: '', bulan: '', tahun: '', siswa: [] }); setProcessedImages([]); };

            // ==========================================
            // AGREGASI & FILTER DATA
            // ==========================================
            const currentRecords = Array.isArray(records) ? records : [];
            const optionsPendamping = [...new Set(currentRecords.map(r => r?.pendamping))].filter(Boolean);
            const optionsBentuk = [...new Set(currentRecords.map(r => r?.bentuk))].filter(Boolean);
            const optionsTingkat = [...new Set(currentRecords.map(r => r?.tingkat))].filter(Boolean);

            const filteredKomponen = currentRecords.filter(item => {
                if (!item) return false;
                const matchSearch = Object.values(item).some(val => String(val || '').toLowerCase().includes(searchQuery.toLowerCase()));
                return matchSearch && (filterPendamping ? item.pendamping === filterPendamping : true) 
                    && (filterBentuk ? item.bentuk === filterBentuk : true) 
                    && (filterTingkat ? item.tingkat === filterTingkat : true);
            });

            const aggregatePendamping = filteredKomponen.reduce((acc, curr) => { const p = curr.pendamping || 'Tanpa Nama'; acc[p] = (acc[p] || 0) + 1; return acc; }, {});
            const aggregateBentukTingkat = filteredKomponen.reduce((acc, curr) => {
                const bentuk = curr.bentuk || 'Lainnya'; const tingkat = curr.tingkat || 'Lainnya';
                if (!acc[bentuk]) acc[bentuk] = {}; acc[bentuk][tingkat] = (acc[bentuk][tingkat] || 0) + 1;
                return acc;
            }, {});

            const arsipDokumen = currentRecords.reduce((acc, current) => {
                if (!current) return acc;
                const key = `${current.sekolah}-${current.bulan}-${current.tahun}-${current.pendamping}`;
                if (!acc[key]) acc[key] = current; return acc;
            }, {});
            
            const arsipUnik = Object.values(arsipDokumen);
            const filteredArsip = arsipUnik.filter(item => String(item.sekolah || '').toLowerCase().includes(searchArsip.toLowerCase()) || String(item.pendamping || '').toLowerCase().includes(searchArsip.toLowerCase()));

            const totalSekolahUnik = new Set(arsipUnik.map(a => a.sekolah)).size;
            const totalPendampingAktif = new Set(arsipUnik.map(a => a.pendamping)).size;

            // ==========================================
            // EXPORT EXCEL & PDF
            // ==========================================
            const exportToExcel = () => {
                if (filteredKomponen.length === 0) return showToast("Tidak ada data untuk diekspor", 'error');
                if (!window.XLSX) return showToast("Library Excel gagal dimuat.", 'error');
                try {
                    const wsData = filteredKomponen.map((r, i) => ({ "No": i + 1, "Sekolah": r.sekolah, "Periode": `${r.bulan} ${r.tahun}`, "Pendamping": r.pendamping, "NIK Pengurus": r.nik_pengurus, "Nama Pengurus": r.nama_pengurus, "NIK Siswa": r.nik_siswa, "NISN": r.nisn, "Nama Siswa": r.nama_siswa, "Bentuk": r.bentuk, "Tingkat": r.tingkat }));
                    const wb = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(wsData), "Data");
                    XLSX.writeFile(wb, `Data_Komponen_${new Date().getTime()}.xlsx`);
                } catch (e) { showToast("Gagal mengekspor Excel", "error"); }
            };

            const exportToPDF = () => {
                if (filteredKomponen.length === 0) return showToast("Tidak ada data untuk dicetak", 'error');
                if (!window.jspdf || !window.jspdf.jsPDF) return showToast("Library PDF gagal dimuat.", 'error');
                try {
                    const doc = new window.jspdf.jsPDF('l', 'mm', 'a4');
                    doc.setFont('helvetica', 'bold'); doc.setFontSize(16); doc.text("Laporan Data Verifikasi", 14, 15);
                    doc.setFontSize(10); doc.setFont('helvetica', 'normal'); doc.text(`Total: ${filteredKomponen.length} Siswa`, 14, 22);
                    const tableData = filteredKomponen.map((r, i) => [ i + 1, r.sekolah, r.pendamping, r.nama_pengurus, r.nisn, r.nama_siswa, r.bentuk, r.tingkat ]);
                    doc.autoTable({ head: [['No', 'Sekolah', 'Pendamping', 'Pengurus', 'NISN', 'Siswa', 'Bentuk', 'Kelas']], body: tableData, startY: 28, theme: 'grid', styles: { fontSize: 8 }, headStyles: { fillColor: [37, 99, 235] }});
                    doc.save(`Laporan_${new Date().getTime()}.pdf`);
                } catch (e) { showToast("Gagal mencetak PDF", "error"); }
            };

            // ==========================================
            // RENDER UI
            // ==========================================
            return (
                <div>
                    <div className="toast-container">
                        {toast && <ToastMessage message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                    </div>

                    {/* MODAL EDIT ADMIN */}
                    {editModal && (
                        <div className="modal d-block fade-in" style={{backgroundColor: 'rgba(0,0,0,0.8)'}} tabIndex="-1">
                            <div className="modal-dialog modal-lg modal-dialog-centered">
                                <div className="modal-content card-custom border-warning">
                                    <div className="modal-header border-secondary border-opacity-50 pb-3">
                                        <h5 className="modal-title fw-bold text-warning"><i className="fas fa-edit me-2"></i> Edit Data Admin</h5>
                                    </div>
                                    <form onSubmit={handleUpdateSubmit}>
                                        <div className="modal-body py-4 row g-3">
                                            <div className="col-md-6">
                                                <label className="form-label text-secondary small">Nama Siswa</label>
                                                <input type="text" className="form-control" value={editModal.nama_siswa} onChange={e => setEditModal({...editModal, nama_siswa: e.target.value})} required/>
                                            </div>
                                            <div className="col-md-6">
                                                <label className="form-label text-secondary small">NISN</label>
                                                <input type="text" className="form-control" value={editModal.nisn} onChange={e => setEditModal({...editModal, nisn: e.target.value})} />
                                            </div>
                                            <div className="col-md-6">
                                                <label className="form-label text-secondary small">Nama Pengurus</label>
                                                <input type="text" className="form-control" value={editModal.nama_pengurus} onChange={e => setEditModal({...editModal, nama_pengurus: e.target.value})} />
                                            </div>
                                            <div className="col-md-6">
                                                <label className="form-label text-secondary small">Pendamping</label>
                                                <input type="text" className="form-control" value={editModal.pendamping} onChange={e => setEditModal({...editModal, pendamping: e.target.value})} />
                                            </div>
                                            <div className="col-md-8">
                                                <label className="form-label text-secondary small">Asal Sekolah</label>
                                                <input type="text" className="form-control" value={editModal.sekolah} onChange={e => setEditModal({...editModal, sekolah: e.target.value})} />
                                            </div>
                                            <div className="col-md-2">
                                                <label className="form-label text-secondary small">Bentuk</label>
                                                <input type="text" className="form-control" value={editModal.bentuk} onChange={e => setEditModal({...editModal, bentuk: e.target.value})} />
                                            </div>
                                            <div className="col-md-2">
                                                <label className="form-label text-secondary small">Tingkat</label>
                                                <input type="text" className="form-control" value={editModal.tingkat} onChange={e => setEditModal({...editModal, tingkat: e.target.value})} />
                                            </div>
                                        </div>
                                        <div className="modal-footer border-0 pt-0">
                                            <button type="button" className="btn btn-light-custom" onClick={() => setEditModal(null)}>Batal</button>
                                            <button type="submit" className="btn btn-warning fw-bold">Simpan Perubahan</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}

                    <nav className="navbar navbar-expand-lg glass-header sticky-top py-3">
                        <div className="container-fluid px-4 px-lg-5">
                            <a className="navbar-brand fw-black text-white fs-4 d-flex align-items-center gap-2" href="#" onClick={(e)=>{e.preventDefault(); setActiveTab('upload');}}>
                                <div className="bg-primary text-white rounded p-2 d-flex align-items-center justify-content-center shadow" style={{width:'36px', height:'36px'}}><i className="fas fa-expand"></i></div>
                                <span>Verif<span className="text-secondary">Digi Pro</span></span>
                            </a>
                            
                            <button className="navbar-toggler border-0 text-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                                <i className="fas fa-bars fs-3"></i>
                            </button>

                            <div className="collapse navbar-collapse justify-content-end" id="navbarNav">
                                <ul className="nav nav-pills mt-3 mt-lg-0 gap-2 d-flex flex-column flex-lg-row align-items-lg-center">
                                    <li className="nav-item">
                                        <button onClick={() => setActiveTab('upload')} className={`nav-link w-100 text-start ${activeTab === 'upload' ? 'active' : ''}`}><i className="fas fa-upload me-2"></i> Scan AI</button>
                                    </li>
                                    <li className="nav-item">
                                        <button onClick={() => setActiveTab('dashboard_komponen')} className={`nav-link w-100 text-start ${activeTab === 'dashboard_komponen' ? 'active' : ''}`}><i className="fas fa-chart-pie me-2"></i> Statistik</button>
                                    </li>
                                    <li className="nav-item">
                                        <button onClick={() => setActiveTab('data_komponen')} className={`nav-link w-100 text-start ${activeTab === 'data_komponen' ? 'active' : ''}`}><i className="fas fa-database me-2"></i> Database</button>
                                    </li>
                                    <li className="nav-item">
                                        <button onClick={() => setActiveTab('dashboard_arsip')} className={`nav-link w-100 text-start ${activeTab === 'dashboard_arsip' ? 'active' : ''}`}><i className="fas fa-folder-open me-2"></i> Dashboard Arsip</button>
                                    </li>
                                    <li className="nav-item">
                                        <button onClick={() => setActiveTab('arsip_pdf')} className={`nav-link w-100 text-start ${activeTab === 'arsip_pdf' ? 'active' : ''}`}><i className="fas fa-file-pdf me-2"></i> Arsip PDF</button>
                                    </li>
                                    <li className="nav-item ms-lg-3 border-start border-secondary border-opacity-50 ps-lg-3 mt-2 mt-lg-0">
                                        <button onClick={handleAdminToggle} className={`btn btn-sm w-100 fw-bold ${isAdmin ? 'btn-warning' : 'btn-outline-secondary rounded-pill'}`}>
                                            <i className={`fas ${isAdmin ? 'fa-unlock' : 'fa-lock'} me-2`}></i> {isAdmin ? 'Admin Aktif' : 'Admin'}
                                        </button>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </nav>

                    <main className="container-fluid px-4 px-lg-5 py-5 flex-grow-1">
                        
                        {/* 1. UPLOAD VIEW */}
                        {activeTab === 'upload' && (
                            <div className="row justify-content-center fade-in">
                                <div className="col-12 col-lg-8 col-xl-7">
                                    
                                    {uploadState === 'idle' && (
                                        <div className="card-custom p-5 text-center">
                                            <div className="mx-auto bg-dark text-primary rounded-circle d-flex align-items-center justify-content-center mb-4 border border-secondary border-opacity-50" style={{width:'90px', height:'90px'}}>
                                                <i className="fas fa-copy fs-1"></i>
                                            </div>
                                            <h1 className="fw-black text-white mb-3">Multi-Page AI Scanner</h1>
                                            <p className="text-secondary fs-5 mb-5">Sistem Anti-Duplikasi Aktif. AI Gemini Flash akan mengekstrak otomatis. Jika siswa yang sama (NISN & Periode sama) diupload ulang, sistem akan melewatkannya.</p>
                                            
                                            <input type="file" multiple accept="image/*" className="d-none" ref={fileInputRef} onChange={handleFileChange} />
                                            <button onClick={() => fileInputRef.current.click()} className="btn btn-brand btn-lg px-5 py-3 fs-5 rounded-pill shadow">
                                                <i className="fas fa-camera me-2"></i> Pilih Foto Dokumen
                                            </button>
                                        </div>
                                    )}

                                    {(uploadState === 'processing_image' || uploadState === 'extracting' || uploadState === 'saving') && (
                                        <div className="card-custom p-5 text-center">
                                            <div className="spinner-border text-primary mb-4" role="status"></div>
                                            <h2 className="fw-bold text-white mb-3">
                                                {uploadState === 'processing_image' ? `Memproses ${fileInputRef.current?.files.length || 0} Gambar...` : 
                                                 uploadState === 'extracting' ? 'AI Menyisir Baris Tabel...' : 
                                                 'Menyimpan Data & Mengecek Duplikasi...'}
                                            </h2>
                                            <p className="text-secondary">Mohon tunggu, proses ini menjamin akurasi tinggi.</p>
                                        </div>
                                    )}

                                    {uploadState === 'form' && (
                                        <div className="card-custom overflow-hidden fade-in">
                                            <div className="bg-dark p-4 border-bottom border-secondary border-opacity-50 d-flex justify-content-between align-items-center">
                                                <h3 className="text-white fw-bold m-0"><i className="fas fa-check-double text-primary me-2"></i> Verifikasi Data AI</h3>
                                                <span className="badge bg-primary fs-6 py-2 px-3 rounded-pill">{(extractedData.siswa || []).length} Baris Terbaca</span>
                                            </div>
                                            
                                            <form onSubmit={handleSave} className="p-4 p-md-5">
                                                <div className="row g-4 bg-dark bg-opacity-50 p-4 rounded-4 border border-secondary border-opacity-25 mb-4">
                                                    <div className="col-12 col-md-6">
                                                        <label className="form-label text-secondary fw-bold small text-uppercase">Nama Sekolah (Kop)</label>
                                                        <div className="form-control bg-dark border-secondary border-opacity-25 text-white fw-bold fs-5 py-3">{extractedData.sekolah || '-'}</div>
                                                    </div>
                                                    <div className="col-12 col-md-6">
                                                        <label className="form-label text-secondary fw-bold small text-uppercase">Periode</label>
                                                        <div className="form-control bg-dark border-secondary border-opacity-25 text-white fw-bold fs-5 py-3">{extractedData.bulan} {extractedData.tahun}</div>
                                                    </div>
                                                </div>
                                                
                                                <h5 className="text-white fw-bold mb-3 border-bottom border-secondary border-opacity-50 pb-2">Tabel Data Siswa & Pendamping</h5>
                                                <div className="overflow-auto custom-scrollbar pe-2 mb-4" style={{maxHeight: '400px'}}>
                                                    {(extractedData.siswa || []).map((s, i) => (
                                                        <div key={i} className="bg-dark bg-opacity-50 p-4 rounded-4 border border-secondary border-opacity-25 mb-3">
                                                            <div className="row align-items-center g-3">
                                                                <div className="col-12 col-lg-7">
                                                                    <div className="d-flex align-items-start gap-3">
                                                                        <span className="badge bg-secondary rounded-pill py-2 px-3 mt-1">{i+1}</span>
                                                                        <div>
                                                                            <h5 className="text-white fw-bold mb-1">{s.nama_siswa}</h5>
                                                                            <div className="text-secondary small mb-2">NISN: <span className="text-white">{s.nisn}</span> | NIK: <span className="text-white">{s.nik_siswa}</span></div>
                                                                            <div className="badge-brand d-inline-block"><i className="fas fa-user me-1"></i> PENDAMPING: {s.pendamping}</div>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                                <div className="col-12 col-lg-5 text-lg-end">
                                                                    <div className="badge bg-secondary text-white py-2 px-3 rounded-pill mb-2 border border-secondary border-opacity-50">
                                                                        {s.bentuk} &bull; {s.tingkat}
                                                                    </div>
                                                                    <div className="text-secondary small bg-dark p-2 rounded border border-secondary border-opacity-25 d-inline-block mt-2 mt-lg-0">
                                                                        Wali: <strong className="text-white">{s.nama_pengurus}</strong>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                    {(extractedData.siswa || []).length === 0 && <div className="text-center text-secondary py-5">Tidak ada data.</div>}
                                                </div>
                                                
                                                <div className="d-flex flex-column flex-sm-row gap-3 pt-4 border-top border-secondary border-opacity-50">
                                                    <button type="button" onClick={resetForm} className="btn btn-light-custom btn-lg w-100">Batal</button>
                                                    <button type="submit" className="btn btn-brand btn-lg w-100"><i className="fas fa-cloud-upload-alt me-2"></i> Simpan ke Server</button>
                                                </div>
                                            </form>
                                        </div>
                                    )}

                                    {uploadState === 'success' && (
                                        <div className="card-custom p-5 text-center border-top border-success border-4 fade-in">
                                            <i className="fas fa-check-circle text-success mx-auto mb-4" style={{fontSize: '5rem'}}></i>
                                            <h2 className="text-white fw-black mb-3">Berhasil!</h2>
                                            <p className="text-secondary mb-5 fs-5">Data berhasil diverifikasi dan masuk ke Database. Cek notifikasi pojok kanan untuk info duplikasi.</p>
                                            <div className="d-flex flex-column flex-sm-row justify-content-center gap-3">
                                                <button onClick={resetForm} className="btn btn-light-custom btn-lg px-4">Upload Lain</button>
                                                <button onClick={() => setActiveTab('data_komponen')} className="btn btn-brand btn-lg px-4">Lihat Database Live</button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* FILTER BAR GLOBAL */}
                        {(() => {
                            if(activeTab === 'dashboard_komponen' || activeTab === 'data_komponen') {
                                return (
                                    <div className="card-custom p-4 mb-5 fade-in">
                                        <div className="row g-3">
                                            <div className="col-12 col-md-3">
                                                <div className="input-group">
                                                    <span className="input-group-text bg-dark border-secondary border-opacity-50 text-secondary"><i className="fas fa-search"></i></span>
                                                    <input type="text" className="form-control" placeholder="Cari nama, NISN..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} />
                                                </div>
                                            </div>
                                            <div className="col-12 col-md-3">
                                                <select className="form-select" value={filterPendamping} onChange={e=>setFilterPendamping(e.target.value)}>
                                                    <option value="">Semua Pendamping</option>
                                                    {optionsPendamping.map((opt, i) => <option key={i} value={opt}>{opt}</option>)}
                                                </select>
                                            </div>
                                            <div className="col-12 col-md-3">
                                                <select className="form-select" value={filterBentuk} onChange={e=>setFilterBentuk(e.target.value)}>
                                                    <option value="">Semua Jenjang</option>
                                                    {optionsBentuk.map((opt, i) => <option key={i} value={opt}>{opt}</option>)}
                                                </select>
                                            </div>
                                            <div className="col-12 col-md-3">
                                                <select className="form-select" value={filterTingkat} onChange={e=>setFilterTingkat(e.target.value)}>
                                                    <option value="">Semua Kelas</option>
                                                    {optionsTingkat.map((opt, i) => <option key={i} value={opt}>{opt}</option>)}
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                );
                            }
                            return null;
                        })()}

                        {/* 2. STATISTIK */}
                        {activeTab === 'dashboard_komponen' && (
                            <div className="fade-in">
                                <div className="d-flex align-items-center gap-3 mb-4 border-bottom border-secondary border-opacity-50 pb-3">
                                    <div className="bg-primary text-white p-3 rounded-4"><i className="fas fa-chart-bar fs-4"></i></div>
                                    <div><h2 className="text-white fw-bold m-0">Statistik Data</h2></div>
                                </div>
                                
                                <div className="row g-4">
                                    <div className="col-12 col-lg-4 d-flex flex-column gap-4">
                                        <div className="card card-stats p-4 rounded-4 shadow h-100 justify-content-center">
                                            <div className="text-white-50 fw-bold text-uppercase mb-2">Total Siswa</div>
                                            <div className="display-3 fw-black">{filteredKomponen.length}</div>
                                            <i className="fas fa-users position-absolute opacity-25" style={{fontSize:'8rem', right:'-20px', bottom:'-20px'}}></i>
                                        </div>
                                        <div className="card card-custom p-4 rounded-4 shadow h-100">
                                            <h5 className="text-white fw-bold mb-4 border-bottom border-secondary border-opacity-50 pb-2">Top Surveyor</h5>
                                            <div className="overflow-auto custom-scrollbar pe-2" style={{maxHeight:'250px'}}>
                                                {Object.entries(aggregatePendamping).sort((a,b)=>b[1]-a[1]).map(([k,v], i) => (
                                                    <div key={k} className="d-flex justify-content-between align-items-center bg-dark p-3 rounded-3 mb-2 border border-secondary border-opacity-25">
                                                        <span className="text-white text-truncate me-2"><span className="text-secondary me-2">{i+1}.</span>{k}</span>
                                                        <span className="badge bg-primary rounded-pill py-2 px-3">{v}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="col-12 col-lg-8">
                                        <div className="card card-custom p-4 p-md-5 rounded-4 shadow h-100">
                                            <h4 className="text-white fw-bold mb-4 border-bottom border-secondary border-opacity-50 pb-3">Distribusi Jenjang & Kelas</h4>
                                            <div className="row g-4">
                                                {Object.entries(aggregateBentukTingkat).map(([bentuk, data]) => (
                                                    <div key={bentuk} className="col-12 col-md-6">
                                                        <div className="bg-dark p-4 rounded-4 border border-secondary border-opacity-25 h-100">
                                                            <div className="d-flex justify-content-between align-items-center mb-4 border-bottom border-secondary border-opacity-25 pb-3">
                                                                <h2 className="text-primary fw-black m-0">{bentuk}</h2>
                                                                <span className="badge bg-secondary border border-secondary">{Object.values(data).reduce((a,b)=>a+b,0)} Total</span>
                                                            </div>
                                                            {Object.entries(data).map(([t, c]) => (
                                                                <div key={t} className="d-flex justify-content-between align-items-center bg-black bg-opacity-25 p-3 rounded-3 mb-2">
                                                                    <span className="text-secondary fw-bold">{t}</span>
                                                                    <span className="text-white fw-bold bg-dark px-3 py-1 rounded">{c}</span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 3. DATABASE (DENGAN TOMBOL ADMIN) */}
                        {activeTab === 'data_komponen' && (
                            <div className="fade-in d-flex flex-column" style={{height:'75vh'}}>
                                <div className="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4 border-bottom border-secondary border-opacity-50 pb-3">
                                    <div className="d-flex align-items-center gap-3">
                                        <div className="bg-success text-white p-3 rounded-4"><i className="fas fa-database fs-4"></i></div>
                                        <h2 className="text-white fw-bold m-0">Live Database</h2>
                                    </div>
                                    <div className="d-flex gap-2">
                                        <button onClick={exportToExcel} className="btn btn-outline-success fw-bold"><i className="fas fa-file-excel me-2"></i> Excel</button>
                                        <button onClick={exportToPDF} className="btn btn-outline-danger fw-bold"><i className="fas fa-file-pdf me-2"></i> PDF</button>
                                    </div>
                                </div>

                                <div className="card-custom rounded-4 flex-grow-1 overflow-hidden d-flex flex-column shadow">
                                    <div className="table-responsive flex-grow-1 custom-scrollbar">
                                        <table className="table table-dark table-hover mb-0">
                                            <thead className="sticky-top" style={{zIndex:10}}>
                                                <tr>
                                                    <th className="p-4">Identitas Siswa (NISN)</th>
                                                    <th className="p-4">Jenjang / Kelas</th>
                                                    <th className="p-4">Asal Sekolah & Pengurus</th>
                                                    <th className="p-4">Pendamping & Berkas</th>
                                                    {isAdmin && <th className="p-4 text-warning"><i className="fas fa-crown me-1"></i> Aksi Admin</th>}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {loadingData ? <tr><td colSpan={isAdmin ? "5" : "4"} className="text-center py-5"><div className="spinner-border text-primary"></div></td></tr> :
                                                 filteredKomponen.length===0 ? <tr><td colSpan={isAdmin ? "5" : "4"} className="text-center text-secondary py-5">Kosong</td></tr> :
                                                 filteredKomponen.map((r,i) => (
                                                    <tr key={i}>
                                                        <td className="p-4"><div className="fw-bold text-white fs-6">{r.nama_siswa}</div><div className="text-secondary small mt-1"><span className="bg-dark px-2 py-1 rounded border border-secondary border-opacity-25">NISN: {r.nisn}</span></div></td>
                                                        <td className="p-4"><span className="badge bg-secondary text-white py-2 px-3 border border-secondary border-opacity-50">{r.bentuk} &bull; {r.tingkat}</span></td>
                                                        <td className="p-4">
                                                            <div className="text-white fw-bold mb-1">{r.sekolah} <span className="text-secondary fw-normal">({r.bulan} {r.tahun})</span></div>
                                                            <div className="text-secondary small"><i className="fas fa-user-tie me-1"></i> {r.nama_pengurus}</div>
                                                        </td>
                                                        <td className="p-4">
                                                            <div className="badge-brand d-inline-block mb-2 text-truncate" style={{maxWidth:'150px'}}><i className="fas fa-user me-1"></i> {r.pendamping}</div><br/>
                                                            {r.url!=='#' ? <a href={r.url} target="_blank" className="btn btn-sm btn-outline-danger fw-bold"><i className="fas fa-file-pdf me-1"></i> Buka</a> : <span className="badge bg-dark text-secondary">No File</span>}
                                                        </td>
                                                        {isAdmin && (
                                                            <td className="p-4">
                                                                <div className="d-flex gap-2">
                                                                    <button onClick={() => setEditModal(r)} className="btn btn-sm btn-outline-warning" title="Edit"><i className="fas fa-edit"></i></button>
                                                                    <button onClick={() => handleDelete(r.timestamp)} className="btn btn-sm btn-outline-danger" title="Hapus Permanen"><i className="fas fa-trash-alt"></i></button>
                                                                </div>
                                                            </td>
                                                        )}
                                                    </tr>
                                                 ))
                                                }
                                            </tbody>
                                        </table>
                                    </div>
                                    <div className="bg-dark p-3 border-top border-secondary border-opacity-25 d-flex justify-content-between text-secondary small fw-bold">
                                        <span>Total: {filteredKomponen.length} Baris Data {isAdmin && <span className="text-warning ms-2">(Mode Admin Aktif)</span>}</span>
                                        <span>Synced <i className="fas fa-cloud text-success"></i></span>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 4. DASHBOARD ARSIP */}
                        {activeTab === 'dashboard_arsip' && (
                            <div className="fade-in">
                                <div className="d-flex align-items-center gap-3 mb-5 border-bottom border-secondary border-opacity-50 pb-3">
                                    <div className="bg-danger text-white p-3 rounded-4"><i className="fas fa-folder-open fs-4"></i></div>
                                    <h2 className="text-white fw-bold m-0">Dashboard Arsip</h2>
                                </div>
                                <div className="row g-4">
                                    <div className="col-12 col-md-4">
                                        <div className="card-custom p-4 p-lg-5 rounded-4 shadow text-center border-top border-danger border-4">
                                            <i className="fas fa-file-pdf text-danger fs-1 mb-3"></i>
                                            <div className="text-secondary fw-bold text-uppercase mb-2">Total Dokumen PDF</div>
                                            <div className="display-4 fw-black text-white">{arsipUnik.length}</div>
                                        </div>
                                    </div>
                                    <div className="col-12 col-md-4">
                                        <div className="card-custom p-4 p-lg-5 rounded-4 shadow text-center border-top border-primary border-4">
                                            <i className="fas fa-school text-primary fs-1 mb-3"></i>
                                            <div className="text-secondary fw-bold text-uppercase mb-2">Sekolah Tervalidasi</div>
                                            <div className="display-4 fw-black text-white">{totalSekolahUnik}</div>
                                        </div>
                                    </div>
                                    <div className="col-12 col-md-4">
                                        <div className="card-custom p-4 p-lg-5 rounded-4 shadow text-center border-top border-success border-4">
                                            <i className="fas fa-id-badge text-success fs-1 mb-3"></i>
                                            <div className="text-secondary fw-bold text-uppercase mb-2">Petugas Terlibat</div>
                                            <div className="display-4 fw-black text-white">{totalPendampingAktif}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 5. ARSIP PDF DIGITAL */}
                        {activeTab === 'arsip_pdf' && (
                            <div className="fade-in">
                                <div className="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-4 mb-5 border-bottom border-secondary border-opacity-50 pb-4">
                                    <div className="d-flex align-items-center gap-3">
                                        <div className="bg-secondary text-white p-3 rounded-4"><i className="fas fa-file-pdf fs-4"></i></div>
                                        <h2 className="text-white fw-bold m-0">Arsip Scan Dokumen</h2>
                                    </div>
                                    <div className="input-group" style={{maxWidth: '400px'}}>
                                        <span className="input-group-text bg-dark border-secondary border-opacity-50 text-secondary"><i className="fas fa-search"></i></span>
                                        <input type="text" className="form-control" placeholder="Cari sekolah, petugas..." value={searchArsip} onChange={e=>setSearchArsip(e.target.value)} />
                                    </div>
                                </div>

                                <div className="row g-4 pb-5">
                                    {loadingData ? <div className="col-12 text-center py-5"><div className="spinner-border text-danger"></div></div> : 
                                     filteredArsip.length===0 ? <div className="col-12 text-center py-5 text-secondary"><i className="fas fa-folder-open fs-1 mb-3"></i><h5>Arsip Kosong</h5></div> :
                                     filteredArsip.map((item, i) => (
                                        <div key={i} className="col-12 col-md-6 col-lg-4 col-xl-3">
                                            <div className="card-custom p-4 rounded-4 shadow h-100 d-flex flex-column hover-shadow transition" style={{transition: 'transform 0.3s', cursor: 'pointer'}} onMouseOver={e=>e.currentTarget.style.transform='translateY(-5px)'} onMouseOut={e=>e.currentTarget.style.transform='translateY(0)'}>
                                                <div className="d-flex justify-content-between align-items-start mb-4">
                                                    <div className="bg-danger bg-opacity-10 p-3 rounded-3 border border-danger border-opacity-25 text-danger"><i className="fas fa-file-pdf fs-4"></i></div>
                                                    <span className="badge bg-dark border border-secondary border-opacity-50 text-secondary py-2">{item.bulan} {item.tahun}</span>
                                                </div>
                                                <h5 className="text-white fw-bold mb-3 lh-base">{item.sekolah}</h5>
                                                <div className="bg-dark p-2 rounded text-secondary small fw-bold mb-4 border border-secondary border-opacity-25"><i className="fas fa-user text-primary me-2"></i>{item.pendamping}</div>
                                                <div className="mt-auto">
                                                    {item.url!=='#' ? <a href={item.url} target="_blank" className="btn btn-outline-danger w-100 fw-bold"><i className="fas fa-external-link-alt me-2"></i> Buka PDF</a> : <button disabled className="btn btn-dark w-100 text-secondary">Offline</button>}
                                                </div>
                                            </div>
                                        </div>
                                     ))
                                    }
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
