<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VerifDigi Pro - Sistem Verifikasi</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { brand: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a' } } } }
        }
    </script>
    
    <!-- Core React Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Export Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>

    <style>
        body { background: #f8fafc; color: #0f172a; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .loader { border: 4px solid #e2e8f0; border-bottom-color: #2563eb; border-radius: 50%; display: inline-block; box-sizing: border-box; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // =========================================================================
        // URL WEB APP GAS (KOSONGKAN UNTUK MODE SIMULASI UJI COBA LOKAL)
        // =========================================================================
        const GAS_WEB_APP_URL = ""; 

        const { useState, useEffect, useRef } = React;

        // --- Ikon SVG ---
        const Icons = {
            Upload: (p) => <svg {...p} width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
            Scan: (p) => <svg {...p} width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><rect x="7" y="7" width="10" height="10" rx="1"/></svg>,
            Database: (p) => <svg {...p} width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>,
            Chart: (p) => <svg {...p} width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>,
            Archive: (p) => <svg {...p} width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="4" width="20" height="5" rx="2"/><path d="M4 9v9a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9"/><line x1="10" y1="13" x2="14" y2="13"/></svg>,
            Search: (p) => <svg {...p} width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
            Check: ({className, ...p}) => <svg {...p} width="32" height="32" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className || "text-emerald-500"}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
            PDF: (p) => <svg {...p} width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M9 15v-4"/><path d="M12 15v-4"/><path d="M15 15v-4"/></svg>,
            Excel: (p) => <svg {...p} width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/></svg>,
            Pages: (p) => <svg {...p} width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M16 22H4a2 2 0 0 1-2-2V6"/></svg>,
            User: (p) => <svg {...p} width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        };

        // --- Komponen Notifikasi ---
        const Toast = ({ message, type, onClose }) => {
            useEffect(() => { const timer = setTimeout(onClose, 4000); return () => clearTimeout(timer); }, [onClose]);
            const bg = type === 'error' ? 'bg-red-600' : 'bg-emerald-600';
            return (
                <div className={`fixed bottom-4 right-4 z-50 ${bg} text-white px-6 py-4 rounded-xl shadow-2xl flex items-center gap-3 animate-slide-up max-w-md`}>
                    {type === 'success' && <Icons.Check className="w-5 h-5 text-white" />}
                    <span className="font-semibold text-sm break-words">{message}</span>
                </div>
            );
        };

        function App() {
            const [activeTab, setActiveTab] = useState('upload'); 
            
            // STATE UPLOAD
            const [uploadState, setUploadState] = useState('idle');
            const [processedImages, setProcessedImages] = useState([]);
            // Inisialisasi aman anti-crash
            const [extractedData, setExtractedData] = useState({ sekolah: '', bulan: '', tahun: '', siswa: [] });
            
            // STATE DATABASE
            const [records, setRecords] = useState([]);
            const [loadingData, setLoadingData] = useState(false);
            const [toast, setToast] = useState(null);
            
            // STATE FILTER
            const [filterPendamping, setFilterPendamping] = useState('');
            const [filterBentuk, setFilterBentuk] = useState('');
            const [filterTingkat, setFilterTingkat] = useState('');
            const [searchQuery, setSearchQuery] = useState('');
            const [searchArsip, setSearchArsip] = useState('');

            const fileInputRef = useRef(null);
            const canvasRef = useRef(null);

            const showToast = (message, type = 'success') => setToast({ message, type });

            useEffect(() => {
                if (activeTab !== 'upload' && records.length === 0) fetchData();
            }, [activeTab]);

            // ==========================================
            // PROSES GAMBAR LINTAS HALAMAN
            // ==========================================
            const handleFileChange = async (e) => {
                const files = Array.from(e.target.files || []);
                if (files.length === 0) return;
                
                setUploadState('processing_image');
                const base64Array = [];

                for (let file of files) {
                    const base64 = await processSingleImage(file);
                    base64Array.push(base64);
                }

                setProcessedImages(base64Array);
                extractTextFromMultipleImages(base64Array);
            };

            const processSingleImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const ctx = canvas.getContext('2d');
                            const maxWidth = 1800; 
                            let width = img.width, height = img.height;
                            if (width > maxWidth) { height = Math.round((height * maxWidth) / width); width = maxWidth; }
                            
                            canvas.width = width; canvas.height = height;
                            ctx.filter = 'grayscale(100%) contrast(160%) brightness(105%)'; 
                            ctx.drawImage(img, 0, 0, width, height);
                            resolve(canvas.toDataURL('image/jpeg', 0.8)); 
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            };

            const extractTextFromMultipleImages = async (base64Array) => {
                setUploadState('extracting');
                try {
                    const cleanBase64Array = base64Array.map(img => img.split(',')[1]);
                    let data;
                    
                    if (GAS_WEB_APP_URL === "") {
                        // MODE SIMULASI LOKAL 
                        await new Promise(r => setTimeout(r, 2000));
                        data = { 
                            status: 'success', 
                            data: { 
                                sekolah: 'SD NEGERI RANGDA MALINGKUNG 4', bulan: 'JANUARI', tahun: '2026', 
                                siswa: [
                                    { nik_pengurus: '6305094703880001', nama_pengurus: 'ELY SRILESTARI', nik_siswa: '6305043004180001', nisn: '3187240495', nama_siswa: 'ABDUL GHANI BAYHAKI', bentuk: 'SD', tingkat: 'Kelas 2', pendamping: 'M ZAEN SYACHRULLAH' },
                                    { nik_pengurus: '1234567890123456', nama_pengurus: 'BUDI SANTOSO', nik_siswa: '0987654321098765', nisn: '11223344', nama_siswa: 'CITRA LESTARI', bentuk: 'SD', tingkat: 'Kelas 3', pendamping: 'M ZAEN SYACHRULLAH' }
                                ]
                            } 
                        };
                    } else {
                        const res = await fetch(GAS_WEB_APP_URL, {
                            method: 'POST', body: JSON.stringify({ action: 'extract_multiple', images: cleanBase64Array }), headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                        });
                        data = await res.json();
                    }

                    if (data.status === 'success') {
                        // Validasi anti-crash jika AI mengembalikan data kosong
                        const safeData = {
                            sekolah: data.data.sekolah || '',
                            bulan: data.data.bulan || '',
                            tahun: data.data.tahun || '',
                            siswa: data.data.siswa && Array.isArray(data.data.siswa) ? data.data.siswa : [] 
                        };
                        setExtractedData(safeData);
                        setUploadState('form');
                        showToast(`Berhasil membaca ${safeData.siswa.length} baris tabel!`, 'success');
                    } else throw new Error(data.message);
                } catch (err) {
                    showToast('Gagal membaca dokumen: ' + err.message, 'error');
                    setUploadState('idle');
                }
            };

            const handleSave = async (e) => {
                e.preventDefault();
                setUploadState('saving');

                try {
                    if (!window.jspdf || !window.jspdf.jsPDF) throw new Error("Gagal membuat PDF. Cek koneksi internet.");

                    const doc = new window.jspdf.jsPDF('p', 'mm', 'a4');
                    
                    processedImages.forEach((imgBase64, index) => {
                        if (index > 0) doc.addPage();
                        const imgProps = doc.getImageProperties(imgBase64);
                        const pdfWidth = doc.internal.pageSize.getWidth();
                        const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
                        doc.addImage(imgBase64, 'JPEG', 0, 0, pdfWidth, pdfHeight);
                    });

                    let pdfUrlToSave = '#';

                    if (GAS_WEB_APP_URL === "") {
                        const pdfBlob = doc.output('blob');
                        pdfUrlToSave = URL.createObjectURL(pdfBlob);
                        await new Promise(r => setTimeout(r, 1500));
                        
                        const mockRecords = (extractedData.siswa || []).map(s => ({
                            timestamp: new Date().toISOString(), sekolah: extractedData.sekolah, bulan: extractedData.bulan, tahun: extractedData.tahun, url: pdfUrlToSave, ...s
                        }));
                        setRecords(prev => [...mockRecords, ...prev]);
                    } else {
                        const pdfBase64Data = doc.output('datauristring').split(',')[1];
                        const payload = { action: 'save', pdfBase64: pdfBase64Data, sekolah: extractedData.sekolah, bulan: extractedData.bulan, tahun: extractedData.tahun, siswa: extractedData.siswa || [] };
                        const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload), headers: { 'Content-Type': 'text/plain;charset=utf-8' }});
                        const resData = await res.json();
                        if (resData.status !== 'success') throw new Error(resData.message);
                        fetchData();
                    }
                    
                    setUploadState('success');
                    showToast('Semua data berhasil disimpan!', 'success');
                } catch (err) {
                    showToast('Gagal menyimpan: ' + err.message, 'error');
                    setUploadState('form');
                }
            };

            const fetchData = async () => {
                if (GAS_WEB_APP_URL === "https://script.google.com/macros/s/AKfycbzstqUf4-goekIr0Gnw1CxWKWYN6AqPkG2pLdSGEA77b0cih8xproiBIKjBiTdd95kt/exec") return;
                setLoadingData(true);
                try {
                    const res = await fetch(`${GAS_WEB_APP_URL}?action=getRecords`);
                    const result = await res.json();
                    if (result.status === 'success') setRecords(result.data || []);
                } catch (error) { showToast("Gagal memuat database dari server", 'error'); } 
                finally { setLoadingData(false); }
            };

            const resetForm = () => { setUploadState('idle'); setExtractedData({ sekolah: '', bulan: '', tahun: '', siswa: [] }); setProcessedImages([]); };

            // ==========================================
            // AGREGASI & FILTER DATA (Aman dari Undefined)
            // ==========================================
            const currentRecords = Array.isArray(records) ? records : [];
            
            const optionsPendamping = [...new Set(currentRecords.map(r => r.pendamping))].filter(Boolean);
            const optionsBentuk = [...new Set(currentRecords.map(r => r.bentuk))].filter(Boolean);
            const optionsTingkat = [...new Set(currentRecords.map(r => r.tingkat))].filter(Boolean);

            const filteredKomponen = currentRecords.filter(item => {
                if (!item) return false;
                const matchSearch = Object.values(item).some(val => String(val || '').toLowerCase().includes(searchQuery.toLowerCase()));
                return matchSearch && (filterPendamping ? item.pendamping === filterPendamping : true) 
                    && (filterBentuk ? item.bentuk === filterBentuk : true) 
                    && (filterTingkat ? item.tingkat === filterTingkat : true);
            });

            const aggregatePendamping = filteredKomponen.reduce((acc, curr) => { 
                const p = curr.pendamping || 'Tanpa Nama';
                acc[p] = (acc[p] || 0) + 1; return acc; 
            }, {});
            
            const aggregateBentukTingkat = filteredKomponen.reduce((acc, curr) => {
                const bentuk = curr.bentuk || 'Lainnya'; const tingkat = curr.tingkat || 'Lainnya';
                if (!acc[bentuk]) acc[bentuk] = {}; acc[bentuk][tingkat] = (acc[bentuk][tingkat] || 0) + 1;
                return acc;
            }, {});

            const arsipDokumen = currentRecords.reduce((acc, current) => {
                if (!current) return acc;
                const key = `${current.sekolah}-${current.bulan}-${current.tahun}-${current.pendamping}`;
                if (!acc[key]) acc[key] = current; return acc;
            }, {});
            
            const arsipUnik = Object.values(arsipDokumen);
            const filteredArsip = arsipUnik.filter(item => String(item.sekolah || '').toLowerCase().includes(searchArsip.toLowerCase()) || String(item.pendamping || '').toLowerCase().includes(searchArsip.toLowerCase()));

            const totalSekolahUnik = new Set(arsipUnik.map(a => a.sekolah)).size;
            const totalPendampingAktif = new Set(arsipUnik.map(a => a.pendamping)).size;

            // ==========================================
            // EXPORT EXCEL & PDF
            // ==========================================
            const exportToExcel = () => {
                if (filteredKomponen.length === 0) return showToast("Tidak ada data untuk diekspor", 'error');
                if (!window.XLSX) return showToast("Library Excel gagal dimuat.", 'error');

                const wsData = filteredKomponen.map((r, i) => ({ "No": i + 1, "Nama Sekolah": r.sekolah, "Periode": `${r.bulan} ${r.tahun}`, "Pendamping": r.pendamping, "NIK Pengurus": r.nik_pengurus, "Nama Pengurus": r.nama_pengurus, "NIK Siswa": r.nik_siswa, "NISN": r.nisn, "Nama Siswa": r.nama_siswa, "Bentuk": r.bentuk, "Tingkat": r.tingkat }));
                
                const wb = XLSX.utils.book_new();
                const ws = XLSX.utils.json_to_sheet(wsData);
                XLSX.utils.book_append_sheet(wb, ws, "Komponen");
                XLSX.writeFile(wb, `Data_Komponen_Export.xlsx`);
            };

            const exportToPDF = () => {
                if (filteredKomponen.length === 0) return showToast("Tidak ada data untuk dicetak", 'error');
                if (!window.jspdf || !window.jspdf.jsPDF) return showToast("Library PDF gagal dimuat.", 'error');

                const doc = new window.jspdf.jsPDF('l', 'mm', 'a4');
                doc.setFont('helvetica', 'bold'); doc.setFontSize(14); doc.text("Laporan Data Komponen Sekolah", 14, 15);
                doc.setFont('helvetica', 'normal'); doc.setFontSize(10); doc.text(`Total: ${filteredKomponen.length} Siswa | Petugas: ${filterPendamping || 'Semua'}`, 14, 22);
                doc.autoTable({ head: [['No', 'Sekolah', 'Pendamping', 'Pengurus', 'NISN', 'Siswa', 'Bentuk', 'Kelas']], body: filteredKomponen.map((r, i) => [ i + 1, r.sekolah, r.pendamping, r.nama_pengurus, r.nisn, r.nama_siswa, r.bentuk, r.tingkat ]), startY: 25, theme: 'grid', styles: { fontSize: 8 }, headStyles: { fillColor: [37, 99, 235] }});
                doc.save(`Laporan_Komponen_Export.pdf`);
            };

            // ==========================================
            // DEFINISI MENU (INLINE)
            // ==========================================
            const navItems = [
                { id: 'upload', label: 'Scan Form', icon: Icons.Upload },
                { id: 'dashboard_komponen', label: 'Statistik', icon: Icons.Chart },
                { id: 'data_komponen', label: 'Database', icon: Icons.Database },
                { id: 'dashboard_arsip', label: 'Dashboard Arsip', icon: Icons.Archive },
                { id: 'arsip_pdf', label: 'Arsip PDF', icon: Icons.PDF }
            ];

            return (
                <div className="min-h-screen flex flex-col font-sans">
                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                    <canvas ref={canvasRef} className="hidden"></canvas>

                    {/* TOP NAVIGATION */}
                    <header className="sticky top-0 z-40 glass-panel">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-3 text-brand-600 font-black text-2xl tracking-tight">
                                <div className="bg-brand-600 text-white p-2 rounded-xl shadow-lg shadow-brand-500/30"><Icons.Scan className="w-6 h-6"/></div><span>Verif<span className="text-slate-800">Digi Pro</span></span>
                            </div>
                            <nav className="flex p-1.5 bg-slate-100/50 rounded-2xl overflow-x-auto hide-scroll border border-slate-200/50">
                                {navItems.map(item => {
                                    const IconComponent = item.icon;
                                    return (
                                        <button key={item.id} onClick={() => setActiveTab(item.id)} className={`flex items-center gap-2 px-5 py-3 text-sm font-bold rounded-xl transition-all duration-300 ${activeTab === item.id ? 'bg-white shadow-md text-brand-600 scale-105' : 'text-slate-500 hover:text-slate-800 hover:bg-slate-50'}`}>
                                            <IconComponent className="w-5 h-5"/> {item.label}
                                        </button>
                                    );
                                })}
                            </nav>
                        </div>
                    </header>

                    <main className="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full">
                        
                        {/* 1. UPLOAD VIEW */}
                        {activeTab === 'upload' && (
                            <div className="max-w-3xl mx-auto animate-fade-in">
                                {uploadState === 'idle' && (
                                    <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl shadow-slate-200/50 border border-slate-100 text-center relative overflow-hidden group">
                                        <div className="mx-auto w-24 h-24 bg-brand-100 text-brand-600 rounded-3xl flex items-center justify-center mb-8 shadow-inner"><Icons.Pages className="w-10 h-10"/></div>
                                        <h2 className="text-4xl font-black text-slate-800 mb-4 tracking-tight">Scan Lintas Halaman</h2>
                                        <p className="text-slate-500 text-lg mb-10 max-w-md mx-auto leading-relaxed">Pilih 1 atau beberapa foto sekaligus. AI akan menggabungkan semua halaman menjadi satu data sekolah utuh.</p>
                                        
                                        <input type="file" multiple accept="image/*" className="hidden" ref={fileInputRef} onChange={handleFileChange} />
                                        <button onClick={() => fileInputRef.current.click()} className="bg-brand-600 hover:bg-brand-700 text-white font-black text-lg py-5 px-12 rounded-2xl shadow-xl transition-all hover:-translate-y-1 hover:scale-105 active:scale-95">
                                            Pilih Foto Dokumen
                                        </button>
                                        
                                        {GAS_WEB_APP_URL === "" && <div className="mt-8 animate-pulse inline-block px-5 py-3 bg-amber-50 border border-amber-200 text-amber-700 rounded-xl text-sm font-bold">⚠️ MODE UJI COBA AKTIF (Tanpa Database)</div>}
                                    </div>
                                )}

                                {(uploadState === 'processing_image' || uploadState === 'extracting' || uploadState === 'saving') && (
                                    <div className="bg-white p-20 rounded-[2.5rem] shadow-2xl border border-slate-100 text-center animate-slide-up">
                                        <div className="mb-8"><span className="loader w-20 h-20"></span></div>
                                        <h2 className="text-2xl font-black text-slate-800 tracking-tight">
                                            {uploadState === 'processing_image' ? `Memproses Halaman...` : uploadState === 'extracting' ? 'AI Membaca Lintas Halaman...' : 'Menyatukan ke PDF & Database...'}
                                        </h2>
                                        <p className="text-slate-500 mt-4 font-medium">Mohon tunggu, memastikan tidak ada error pada sistem.</p>
                                    </div>
                                )}

                                {uploadState === 'form' && (
                                    <div className="bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 overflow-hidden animate-slide-up">
                                        <div className="bg-slate-50 px-10 py-8 border-b flex justify-between items-center">
                                            <div><h2 className="text-3xl font-black text-slate-800">Hasil Deteksi AI</h2><p className="text-slate-500 font-medium">Dari {processedImages.length} Halaman Foto</p></div>
                                            <div className="bg-brand-600 text-white px-5 py-2 rounded-xl font-black text-lg shadow-md">{(extractedData.siswa || []).length} Baris</div>
                                        </div>
                                        <form onSubmit={handleSave} className="p-10 space-y-8">
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                                <div className="md:col-span-2">
                                                    <label className="block text-xs font-black text-slate-400 uppercase mb-2">Nama Sekolah (Kop)</label>
                                                    <div className="w-full bg-slate-50 border border-slate-200/60 rounded-2xl px-6 py-4 text-slate-800 font-black text-lg">{extractedData.sekolah || '-'}</div>
                                                </div>
                                                <div className="md:col-span-2">
                                                    <label className="block text-xs font-black text-slate-400 uppercase mb-2">Periode</label>
                                                    <div className="w-full bg-slate-50 border border-slate-200/60 rounded-2xl px-6 py-4 text-slate-800 font-black text-lg">{extractedData.bulan} {extractedData.tahun}</div>
                                                </div>
                                            </div>
                                            
                                            <div>
                                                <div className="flex items-center justify-between mb-4 mt-4">
                                                    <h3 className="text-sm font-black text-slate-800 uppercase">Tabel Gabungan & Pendamping</h3>
                                                </div>
                                                <div className="max-h-80 overflow-y-auto space-y-3 pr-2 custom-scrollbar bg-slate-50 p-4 rounded-3xl border border-slate-100 shadow-inner">
                                                    {(extractedData.siswa || []).map((s, i) => (
                                                        <div key={i} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200/60 flex flex-col md:flex-row justify-between md:items-center gap-4">
                                                            <div>
                                                                <div className="font-black text-slate-800 text-lg flex items-center gap-2"><span className="bg-slate-800 text-white w-6 h-6 flex items-center justify-center rounded-full text-xs">{i+1}</span> {s.nama_siswa}</div>
                                                                <div className="text-xs text-slate-500 font-bold mt-2 ml-8">NISN: <span className="text-slate-700">{s.nisn}</span> | NIK: <span className="text-slate-700">{s.nik_siswa}</span></div>
                                                                <div className="text-xs text-brand-600 font-black mt-2 ml-8 bg-brand-50 border border-brand-100 inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg"><Icons.User className="w-3 h-3" /> Pendamping: {s.pendamping || 'Kosong'}</div>
                                                            </div>
                                                            <div className="text-left md:text-right ml-8 md:ml-0">
                                                                <span className="inline-block bg-slate-100 text-slate-700 px-3 py-1.5 rounded-lg text-xs font-black mb-2">{s.bentuk} - {s.tingkat}</span>
                                                                <div className="text-xs text-slate-400 font-medium">Pengurus: <strong className="text-slate-600">{s.nama_pengurus}</strong></div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                    {(extractedData.siswa || []).length === 0 && <div className="text-center py-10 text-slate-500 font-bold">Tidak ada baris tabel yang terdeteksi.</div>}
                                                </div>
                                            </div>
                                            <div className="flex gap-4 pt-8 border-t border-slate-100">
                                                <button type="button" onClick={resetForm} className="px-8 py-5 bg-slate-100 hover:bg-slate-200 text-slate-600 font-black rounded-2xl">Batal</button>
                                                <button type="submit" className="flex-1 bg-brand-600 hover:bg-brand-700 text-white font-black text-lg py-5 px-8 rounded-2xl shadow-xl hover:-translate-y-1">Simpan {processedImages.length} Halaman PDF & Data</button>
                                            </div>
                                        </form>
                                    </div>
                                )}

                                {uploadState === 'success' && (
                                    <div className="bg-white p-16 rounded-[2.5rem] shadow-2xl border border-slate-100 text-center animate-slide-up">
                                        <div className="flex justify-center mb-8"><Icons.Check className="w-16 h-16 text-emerald-500" /></div>
                                        <h2 className="text-4xl font-black text-slate-800 mb-4">Berhasil Menyimpan!</h2>
                                        <div className="flex justify-center gap-4 mt-8">
                                            <button onClick={resetForm} className="bg-slate-100 text-slate-700 font-black py-4 px-10 rounded-2xl">Upload Lain</button>
                                            <button onClick={() => setActiveTab('data_komponen')} className="bg-brand-600 text-white font-black py-4 px-10 rounded-2xl shadow-xl">Lihat Database</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ========================================================= */}
                        {/* FILTER BAR GLOBAL (Untuk Tab Data & Statistik)            */}
                        {/* ========================================================= */}
                        {(activeTab === 'dashboard_komponen' || activeTab === 'data_komponen') && (
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-4 bg-white p-5 rounded-2xl shadow-sm border border-slate-100 mb-6 animate-fade-in">
                                <div className="relative">
                                    <Icons.Search className="absolute left-4 top-3.5 text-slate-400 w-5 h-5" />
                                    <input type="text" placeholder="Pencarian spesifik..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="w-full pl-12 pr-4 py-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-brand-500 outline-none transition-shadow font-medium text-slate-800" />
                                </div>
                                <select value={filterPendamping} onChange={e => setFilterPendamping(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-brand-500 outline-none font-bold text-slate-700">
                                    <option value="">Semua Pendamping</option>
                                    {optionsPendamping.map((opt, i) => <option key={i} value={opt}>{opt}</option>)}
                                </select>
                                <select value={filterBentuk} onChange={e => setFilterBentuk(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-brand-500 outline-none font-bold text-slate-700">
                                    <option value="">Semua Jenjang</option>
                                    {optionsBentuk.map((opt, i) => <option key={i} value={opt}>{opt}</option>)}
                                </select>
                                <select value={filterTingkat} onChange={e => setFilterTingkat(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-brand-500 outline-none font-bold text-slate-700">
                                    <option value="">Semua Kelas</option>
                                    {optionsTingkat.map((opt, i) => <option key={i} value={opt}>{opt}</option>)}
                                </select>
                            </div>
                        )}

                        {/* 2. STATISTIK KOMPONEN */}
                        {activeTab === 'dashboard_komponen' && (
                            <div className="animate-fade-in">
                                <div className="mb-6"><h2 className="text-3xl font-black text-slate-800 tracking-tight">Statistik Komponen</h2><p className="text-slate-500 text-lg">Visualisasi data berdasarkan filter interaktif.</p></div>
                                
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    <div className="lg:col-span-1 space-y-6">
                                        <div className="bg-gradient-to-br from-brand-600 to-indigo-700 rounded-[2rem] p-8 text-white shadow-xl shadow-brand-500/20 relative overflow-hidden group">
                                            <div className="relative z-10"><div className="text-brand-100 font-bold uppercase text-sm mb-2">Total Siswa</div><div className="text-7xl font-black">{filteredKomponen.length}</div></div>
                                            <div className="absolute -right-6 -bottom-6 opacity-20 text-[10rem] group-hover:scale-110 transition-transform">📈</div>
                                        </div>
                                        <div className="bg-white rounded-[2rem] p-8 shadow-sm border border-slate-100">
                                            <h3 className="font-black text-slate-800 mb-6 text-xl">Top Surveyor Aktif</h3>
                                            <div className="space-y-4">
                                                {Object.entries(aggregatePendamping).sort((a,b) => b[1] - a[1]).map(([key, val]) => (
                                                    <div key={key} className="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                                        <span className="font-bold text-slate-700">{key}</span><span className="bg-white px-3 py-1.5 rounded-xl text-sm font-black text-brand-600 shadow-sm border border-slate-100">{val} Siswa</span>
                                                    </div>
                                                ))}
                                                {Object.keys(aggregatePendamping).length === 0 && <div className="text-slate-400 text-sm text-center py-4 font-bold">Data Kosong</div>}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="lg:col-span-2 bg-white rounded-[2rem] p-10 shadow-sm border border-slate-100">
                                        <h3 className="font-black text-slate-800 mb-8 text-2xl">Distribusi Jenjang & Kelas</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                            {Object.entries(aggregateBentukTingkat).sort((a, b) => String(a[0]).localeCompare(String(b[0]))).map(([bentuk, tingkatData]) => (
                                                <div key={bentuk} className="bg-slate-50 border border-slate-100 p-8 rounded-3xl relative overflow-hidden group hover:border-brand-300 transition-colors">
                                                    <div className="absolute top-0 right-0 w-32 h-32 bg-brand-100 rounded-bl-full -mr-16 -mt-16 transition-transform group-hover:scale-150 duration-500"></div>
                                                    <div className="relative z-10">
                                                        <div className="flex justify-between items-end mb-6 border-b border-slate-200/60 pb-4">
                                                            <span className="font-black text-slate-800 text-4xl">{bentuk}</span>
                                                            <span className="bg-brand-600 text-white px-4 py-2 rounded-xl text-sm font-black shadow-md">Total: {Object.values(tingkatData).reduce((a, b) => a + b, 0)}</span>
                                                        </div>
                                                        <div className="space-y-3">
                                                            {Object.entries(tingkatData).sort((a, b) => String(a[0]).localeCompare(String(b[0]))).map(([tingkat, count]) => (
                                                                <div key={tingkat} className="flex justify-between items-center bg-white p-3 rounded-xl shadow-sm border border-slate-100">
                                                                    <span className="text-slate-600 font-bold">{tingkat}</span><span className="font-black text-slate-800 text-xl">{count}</span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                            {Object.keys(aggregateBentukTingkat).length === 0 && <div className="text-slate-400 text-center py-10 col-span-2 font-bold">Tidak ada data distribusi</div>}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 3. DATA KOMPONEN / DATABASE */}
                        {activeTab === 'data_komponen' && (
                            <div className="animate-fade-in flex flex-col h-[85vh]">
                                <div className="mb-6 flex flex-col md:flex-row md:items-end justify-between gap-4">
                                    <div><h2 className="text-3xl font-black text-slate-800 tracking-tight">Database Komponen</h2><p className="text-slate-500 text-lg">Tabel komprehensif seluruh data siswa hasil ekstraksi.</p></div>
                                    <div className="flex gap-3">
                                        <button onClick={exportToExcel} className="flex items-center gap-2 bg-emerald-50 hover:bg-emerald-100 border border-emerald-200 text-emerald-800 text-sm font-bold py-3 px-6 rounded-2xl transition-colors shadow-sm"><Icons.Excel className="w-5 h-5"/> Ekspor Excel</button>
                                        <button onClick={exportToPDF} className="flex items-center gap-2 bg-rose-50 hover:bg-rose-100 border border-rose-200 text-rose-800 text-sm font-bold py-3 px-6 rounded-2xl transition-colors shadow-sm"><Icons.PDF className="w-5 h-5"/> Cetak PDF</button>
                                    </div>
                                </div>
                                
                                <div className="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden flex-1 flex flex-col mt-2">
                                    <div className="overflow-auto flex-1 p-0 custom-scrollbar">
                                        <table className="w-full text-left text-sm whitespace-nowrap">
                                            <thead className="bg-slate-50 text-slate-500 font-black uppercase tracking-wider text-xs sticky top-0 z-10 border-b border-slate-200 backdrop-blur-md bg-slate-50/90">
                                                <tr><th className="px-8 py-6">Identitas Siswa (NISN)</th><th className="px-8 py-6">Jenjang & Kelas</th><th className="px-8 py-6">Data Pengurus (NIK)</th><th className="px-8 py-6">Asal Sekolah</th><th className="px-8 py-6">Pendamping & Aksi</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {loadingData ? (<tr><td colSpan="5" className="text-center py-20"><span className="loader w-10 h-10"></span></td></tr>) : 
                                                filteredKomponen.length === 0 ? (<tr><td colSpan="5" className="text-center py-20 text-slate-400 font-bold text-lg">Tidak ada data yang sesuai filter.</td></tr>) : 
                                                (
                                                    filteredKomponen.map((item, idx) => (
                                                        <tr key={idx} className="hover:bg-brand-50/50 transition-colors group">
                                                            <td className="px-8 py-5">
                                                                <div className="font-black text-slate-800 text-base group-hover:text-brand-700 transition-colors">{item.nama_siswa}</div>
                                                                <div className="text-xs text-slate-500 font-bold mt-1">NISN: {item.nisn} | NIK: {item.nik_siswa}</div>
                                                            </td>
                                                            <td className="px-8 py-5">
                                                                <span className="inline-flex items-center gap-1.5 py-1.5 px-4 rounded-lg text-xs font-black bg-slate-100 text-slate-700 border border-slate-200">{item.bentuk} <span className="w-1.5 h-1.5 rounded-full bg-slate-400"></span> {item.tingkat}</span>
                                                            </td>
                                                            <td className="px-8 py-5">
                                                                <div className="font-bold text-slate-700">{item.nama_pengurus}</div>
                                                                <div className="text-xs text-slate-400 font-bold mt-1">{item.nik_pengurus}</div>
                                                            </td>
                                                            <td className="px-8 py-5">
                                                                <div className="font-bold text-slate-800">{item.sekolah}</div>
                                                                <div className="text-xs text-slate-400 font-bold mt-1">Periode {item.bulan} {item.tahun}</div>
                                                            </td>
                                                            <td className="px-8 py-5">
                                                                <div className="font-black text-brand-600 mb-2">{item.pendamping}</div>
                                                                {item.url && item.url !== '#' ? <a href={item.url} target="_blank" rel="noreferrer" className="bg-slate-100 text-slate-700 py-1.5 px-4 rounded-lg font-bold hover:bg-slate-200 text-xs transition-colors">Buka PDF</a> : <span className="text-xs text-slate-400 font-bold bg-slate-50 px-3 py-1.5 rounded-lg border border-slate-100">Simulasi Lokal</span>}
                                                            </td>
                                                        </tr>
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 4. DASHBOARD ARSIP (ANGKA RINGKASAN ARSIP) */}
                        {activeTab === 'dashboard_arsip' && (
                            <div className="animate-fade-in">
                                <div className="mb-8">
                                    <h2 className="text-3xl font-black text-slate-800 tracking-tight">Dashboard Arsip</h2>
                                    <p className="text-slate-500 text-lg">Ringkasan status dokumen form fisik yang divalidasi ke sistem.</p>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                                    <div className="bg-white border border-slate-100 rounded-[2rem] p-8 shadow-sm flex items-center gap-6">
                                        <div className="w-16 h-16 rounded-[1rem] bg-rose-50 text-rose-500 flex items-center justify-center shrink-0"><Icons.PDF className="w-8 h-8"/></div>
                                        <div><div className="text-sm text-slate-500 font-bold uppercase">Total Dokumen PDF</div><div className="text-4xl font-black text-slate-900">{arsipUnik.length}</div></div>
                                    </div>
                                    <div className="bg-white border border-slate-100 rounded-[2rem] p-8 shadow-sm flex items-center gap-6">
                                        <div className="w-16 h-16 rounded-[1rem] bg-blue-50 text-blue-500 flex items-center justify-center shrink-0"><Icons.Archive className="w-8 h-8"/></div>
                                        <div><div className="text-sm text-slate-500 font-bold uppercase">Sekolah Tervalidasi</div><div className="text-4xl font-black text-slate-900">{totalSekolahUnik}</div></div>
                                    </div>
                                    <div className="bg-white border border-slate-100 rounded-[2rem] p-8 shadow-sm flex items-center gap-6">
                                        <div className="w-16 h-16 rounded-[1rem] bg-green-50 text-green-500 flex items-center justify-center shrink-0"><Icons.User className="w-8 h-8"/></div>
                                        <div><div className="text-sm text-slate-500 font-bold uppercase">Petugas Terlibat</div><div className="text-4xl font-black text-slate-900">{totalPendampingAktif}</div></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 5. ARSIP PDF DIGITAL (DAFTAR FILE CARD) */}
                        {activeTab === 'arsip_pdf' && (
                            <div className="animate-fade-in">
                                <div className="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
                                    <div><h2 className="text-3xl font-black text-slate-800 tracking-tight">Arsip Dokumen PDF</h2><p className="text-slate-500 text-lg">Koleksi hasil scan fisik form verifikasi yang rapi.</p></div>
                                    <div className="relative w-full md:w-96">
                                        <Icons.Search className="absolute left-5 top-4 text-slate-400 w-5 h-5" />
                                        <input type="text" placeholder="Cari sekolah atau petugas..." value={searchArsip} onChange={e => setSearchArsip(e.target.value)} className="w-full pl-14 pr-5 py-4 bg-white border-2 border-slate-100 rounded-2xl focus:ring-4 focus:ring-brand-500/20 focus:border-brand-500 outline-none transition-all text-slate-800 font-bold shadow-sm" />
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                    {filteredArsip.map((item, idx) => (
                                        <div key={idx} className="bg-white border border-slate-100 rounded-[2rem] p-6 hover:shadow-2xl hover:shadow-brand-500/10 hover:-translate-y-2 transition-all duration-300 flex flex-col justify-between h-full group">
                                            <div>
                                                <div className="flex justify-between items-start mb-6">
                                                    <div className="p-3.5 bg-rose-50 text-rose-600 rounded-2xl group-hover:bg-rose-500 group-hover:text-white transition-colors shadow-sm"><Icons.PDF className="w-6 h-6" /></div>
                                                    <span className="text-xs bg-slate-50 border border-slate-200 text-slate-600 px-3 py-1.5 rounded-xl font-black">{item.bulan} {item.tahun}</span>
                                                </div>
                                                <h3 className="font-black text-slate-800 text-lg mb-3 leading-snug line-clamp-2">{item.sekolah}</h3>
                                                <div className="text-sm text-slate-500 font-bold flex items-center gap-2 mt-4 bg-slate-50 p-2.5 rounded-xl"><Icons.User className="w-4 h-4"/> {item.pendamping}</div>
                                            </div>
                                            <div className="mt-8">
                                                {item.url !== '#' ? (
                                                    <a href={item.url} target="_blank" rel="noreferrer" className="block text-center w-full bg-brand-50 text-brand-700 hover:bg-brand-600 hover:text-white text-sm font-black py-4 rounded-2xl transition-all shadow-sm">Buka PDF Dokumen</a>
                                                ) : (
                                                    <button disabled className="block text-center w-full bg-slate-100 text-slate-400 text-sm font-black py-4 rounded-2xl cursor-not-allowed">Simulasi Lokal</button>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                    {filteredArsip.length === 0 && <div className="col-span-full text-center py-24 text-slate-400 font-black text-xl">Belum ada arsip tersimpan atau ditemukan.</div>}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
