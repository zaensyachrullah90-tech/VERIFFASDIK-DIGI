<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VerifDigi Pro - Night Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>

    <style>
        body { background-color: #0b1120; color: #e2e8f0; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        
        .glass-header { background: rgba(11, 17, 32, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #1e293b; }
        .card-custom { background-color: #111827; border: 1px solid #1e293b; border-radius: 1.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .card-stats { background: linear-gradient(135deg, #0284c7, #1e3a8a); border: none; color: white; }
        
        .nav-pills .nav-link { color: #94a3b8; border-radius: 1rem; padding: 10px 20px; font-weight: 600; cursor: pointer; transition: all 0.3s; border: none; background: transparent; }
        .nav-pills .nav-link:hover { background-color: #1e293b; color: #f8fafc; }
        .nav-pills .nav-link.active { background-color: #2563eb; color: white; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4); }
        
        .form-control, .form-select { background-color: #0f172a; border: 1px solid #334155; color: #f8fafc; border-radius: 1rem; padding: 12px 16px; }
        .form-control:focus, .form-select:focus { background-color: #1e293b; border-color: #3b82f6; color: white; box-shadow: 0 0 0 0.25rem rgba(59, 130, 246, 0.25); }
        
        .table { color: #cbd5e1; }
        .table-dark { background-color: transparent; }
        .table-dark th { background-color: #0f172a; border-bottom: 2px solid #334155; color: #94a3b8; text-transform: uppercase; font-size: 0.8rem; }
        .table-dark td { background-color: #1e293b; border-bottom: 1px solid #334155; vertical-align: middle; }
        .table-hover>tbody>tr:hover>td { background-color: #334155; color: white; }

        .btn-brand { background-color: #2563eb; border: none; color: white; border-radius: 1rem; padding: 12px 24px; font-weight: 700; transition: all 0.2s; }
        .btn-brand:hover { background-color: #1d4ed8; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(37, 99, 235, 0.4); color: white;}
        .btn-light-custom { background-color: #1e293b; color: #e2e8f0; border: none; border-radius: 1rem; padding: 12px 24px; font-weight: 700; }
        .btn-light-custom:hover { background-color: #334155; color: white; }

        .badge-brand { background-color: #1e3a8a; color: #93c5fd; padding: 6px 12px; border-radius: 8px; border: 1px solid #1e40af; font-size: 0.75rem; }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
        .spinner-border { width: 3rem; height: 3rem; border-width: 0.3em; }

        .mobile-menu-collapse { display: none; }
        .mobile-menu-collapse.show { display: block; animation: fadeIn 0.2s; }
        @media (min-width: 992px) { .mobile-menu-collapse { display: block !important; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // -----------------------------------------------------------------------------------------
        // GANTI URL DI BAWAH INI DENGAN URL WEB APP BARU ANDA (YANG AKHIRANNYA /exec)
        // -----------------------------------------------------------------------------------------
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzj9uVYcFb22B-KIVz3ef5h38gp3tXPsl_vyB6dL-agVnsWayBtU-fbqX3dCNmyHHV4/exec"; 

        const { useState, useEffect, useRef } = React;

        const ToastMessage = ({ message, type, onClose }) => {
            useEffect(() => { const timer = setTimeout(onClose, 8000); return () => clearTimeout(timer); }, [onClose]);
            const bgClass = type === 'error' ? 'bg-danger' : type === 'success' ? 'bg-success' : 'bg-warning text-dark';
            const icon = type === 'error' ? 'fa-triangle-exclamation' : type === 'success' ? 'fa-check-circle' : 'fa-info-circle';
            return (
                <div className={`toast show align-items-center text-white ${bgClass} border-0 mb-3 shadow-lg`} role="alert">
                    <div className="d-flex">
                        <div className="toast-body d-flex align-items-center gap-3 fw-bold"><i className={`fas ${icon} fs-4`}></i> {message}</div>
                        <button type="button" className="btn-close btn-close-white me-2 m-auto" onClick={onClose}></button>
                    </div>
                </div>
            );
        };

        function App() {
            const [activeTab, setActiveTab] = useState('upload'); 
            const [isNavOpen, setIsNavOpen] = useState(false);
            
            const [showSettings, setShowSettings] = useState(false);
            const [backendUrl, setBackendUrl] = useState(localStorage.getItem('VERIFDIGI_BACKEND_URL') || GAS_WEB_APP_URL);
            const [tempUrl, setTempUrl] = useState(backendUrl);

            const [isAdmin, setIsAdmin] = useState(false);
            const [editModal, setEditModal] = useState(null);

            const [uploadState, setUploadState] = useState('idle'); 
            const [processedFiles, setProcessedFiles] = useState([]); 
            const [extractedData, setExtractedData] = useState({ sekolah: '', bulan: '', tahun: '', siswa: [] });
            
            const [records, setRecords] = useState([]);
            const [loadingData, setLoadingData] = useState(false);
            const [toast, setToast] = useState(null);
            
            const [filterPendamping, setFilterPendamping] = useState('');
            const [filterBentuk, setFilterBentuk] = useState('');
            const [filterTingkat, setFilterTingkat] = useState('');
            const [searchQuery, setSearchQuery] = useState('');
            const [searchArsip, setSearchArsip] = useState('');

            const fileInputRef = useRef(null);
            const showToast = (message, type = 'success') => setToast({ message, type });

            // FETCH DATA
            const fetchGAS = async (payload) => {
                const res = await fetch(backendUrl, { method: 'POST', body: JSON.stringify(payload), headers: { 'Content-Type': 'text/plain;charset=utf-8' } });
                const text = await res.text();
                try { return JSON.parse(text); } catch (e) { throw new Error("Server Error:\n" + text.substring(0, 100)); }
            };

            const fetchData = async () => {
                if (!backendUrl) return;
                setLoadingData(true);
                try {
                    const result = await fetchGAS({ action: 'getRecords' });
                    if (result.status === 'success') { setRecords(Array.isArray(result.data) ? result.data : []); } 
                    else throw new Error(result.message);
                } catch (error) { showToast("Gagal memuat database: " + error.message, 'error'); } 
                finally { setLoadingData(false); }
            };

            useEffect(() => { if (activeTab !== 'upload' && records.length === 0) fetchData(); }, [activeTab]);

            const changeTab = (tab) => { setActiveTab(tab); setIsNavOpen(false); };

            const handleAdminToggle = () => {
                if (isAdmin) { setIsAdmin(false); showToast('Admin Logout berhasil.', 'info'); } 
                else {
                    const password = window.prompt("Masukkan Password Akses Admin:");
                    if (password === "admin123") { setIsAdmin(true); showToast('Login Admin Berhasil!', 'success'); } 
                    else if (password !== null) { showToast('Password Salah!', 'error'); }
                }
                setIsNavOpen(false);
            };

            const handleDelete = async (timestamp) => {
                if (!window.confirm("Peringatan: Yakin ingin menghapus data ini?")) return;
                showToast("Menghapus data...", "info");
                try {
                    const resData = await fetchGAS({ action: 'delete', timestamp: timestamp });
                    if (resData.status === 'success') { showToast(resData.message, 'success'); fetchData(); } 
                    else throw new Error(resData.message);
                } catch (e) { showToast("Gagal menghapus: " + e.message, "error"); }
            };

            const handleUpdateSubmit = async (e) => {
                e.preventDefault();
                showToast("Menyimpan pembaruan...", "info");
                try {
                    const resData = await fetchGAS({ action: 'update', ...editModal });
                    if (resData.status === 'success') { showToast(resData.message, 'success'); setEditModal(null); fetchData(); } 
                    else throw new Error(resData.message);
                } catch (e) { showToast("Gagal mengupdate: " + e.message, "error"); }
            };

            const readFileAsBase64 = (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = reject; reader.readAsDataURL(file);
                });
            };

            const processSingleImage = (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            try {
                                const canvas = document.createElement('canvas');
                                const ctx = canvas.getContext('2d');
                                const maxWidth = 1800; 
                                let width = img.width, height = img.height;
                                if (width > maxWidth) { height = Math.round((height * maxWidth) / width); width = maxWidth; }
                                canvas.width = width; canvas.height = height;
                                ctx.filter = 'grayscale(100%) contrast(160%) brightness(105%)'; 
                                ctx.drawImage(img, 0, 0, width, height);
                                resolve(canvas.toDataURL('image/jpeg', 0.8)); 
                            } catch (e) { reject(e); }
                        };
                        img.onerror = reject; img.src = event.target.result;
                    };
                    reader.onerror = reject; reader.readAsDataURL(file);
                });
            };

            const handleFileChange = async (e) => {
                try {
                    const files = Array.from(e.target.files || []);
                    if (files.length === 0) return;
                    if (!backendUrl) return showToast('Masukkan URL Google Apps Script!', 'error');
                    
                    setUploadState('processing_image');
                    const fileArray = [];

                    for (let file of files) {
                        if (file.type === 'application/pdf') {
                            const base64 = await readFileAsBase64(file);
                            fileArray.push({ mimeType: 'application/pdf', data: base64.split(',')[1] });
                        } else {
                            const base64 = await processSingleImage(file);
                            fileArray.push({ mimeType: 'image/jpeg', data: base64.split(',')[1] });
                        }
                    }

                    if (fileArray.length === 0) throw new Error("Format file tidak didukung");
                    setProcessedFiles(fileArray);
                    extractTextFromFiles(fileArray);
                } catch (error) { setUploadState('idle'); showToast('Gagal memproses file: ' + error.message, 'error'); }
            };

            const extractTextFromFiles = async (fileArray) => {
                setUploadState('extracting');
                try {
                    const data = await fetchGAS({ action: 'extract_multiple', files: fileArray.map(f => ({ mimeType: f.mimeType, data: f.data })) });
                    if (data.status === 'success') {
                        const safeData = { sekolah: data.data?.sekolah || 'Tidak Terdeteksi', bulan: data.data?.bulan || '-', tahun: data.data?.tahun || '-', siswa: Array.isArray(data.data?.siswa) ? data.data.siswa : [] };
                        setExtractedData(safeData); setUploadState('form');
                        showToast(`Berhasil membaca ${safeData.siswa.length} baris data dari file!`, 'success');
                    } else throw new Error(data.message || "Error dari AI");
                } catch (err) {
                    showToast('Gagal terhubung ke AI: ' + err.message, 'error'); setUploadState('idle');
                }
            };

            const handleSave = async (e) => {
                e.preventDefault();
                setUploadState('saving');
                try {
                    let finalPdfBase64 = "";
                    const hasPdf = processedFiles.some(f => f.mimeType === 'application/pdf');

                    if (hasPdf) {
                        const pdfFile = processedFiles.find(f => f.mimeType === 'application/pdf');
                        finalPdfBase64 = pdfFile.data;
                    } else {
                        if (!window.jspdf || !window.jspdf.jsPDF) throw new Error("Library PDF gagal dimuat.");
                        const doc = new window.jspdf.jsPDF('p', 'mm', 'a4');
                        processedFiles.forEach((f, index) => {
                            if (index > 0) doc.addPage();
                            const imgProps = doc.getImageProperties('data:image/jpeg;base64,' + f.data);
                            const pdfWidth = doc.internal.pageSize.getWidth();
                            const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
                            doc.addImage('data:image/jpeg;base64,' + f.data, 'JPEG', 0, 0, pdfWidth, pdfHeight);
                        });
                        finalPdfBase64 = doc.output('datauristring').split(',')[1];
                    }

                    const payload = { action: 'save', pdfBase64: finalPdfBase64, sekolah: extractedData.sekolah, bulan: extractedData.bulan, tahun: extractedData.tahun, siswa: extractedData.siswa || [] };
                    const resData = await fetchGAS(payload);
                    if (resData.status !== 'success') throw new Error(resData.message);
                    
                    fetchData(); setUploadState('success');
                    if (resData.message) showToast(resData.message, 'success');
                } catch (err) { showToast('Gagal menyimpan: ' + err.message, 'error'); setUploadState('form'); }
            };

            const resetForm = () => { setUploadState('idle'); setExtractedData({ sekolah: '', bulan: '', tahun: '', siswa: [] }); setProcessedFiles([]); };
            const saveSettings = () => { localStorage.setItem('VERIFDIGI_BACKEND_URL', tempUrl); setBackendUrl(tempUrl); setShowSettings(false); showToast('URL API berhasil disimpan!', 'success'); };

            const currentRecords = Array.isArray(records) ? records : [];
            const optionsPendamping = [...new Set(currentRecords.map(r => r?.pendamping))].filter(Boolean);
            const optionsBentuk = [...new Set(currentRecords.map(r => r?.bentuk))].filter(Boolean);
            const optionsTingkat = [...new Set(currentRecords.map(r => r?.tingkat))].filter(Boolean);

            const filteredKomponen = currentRecords.filter(item => {
                if (!item) return false;
                const matchSearch = Object.values(item).some(val => String(val || '').toLowerCase().includes(searchQuery.toLowerCase()));
                return matchSearch && (filterPendamping ? item.pendamping === filterPendamping : true) && (filterBentuk ? item.bentuk === filterBentuk : true) && (filterTingkat ? item.tingkat === filterTingkat : true);
            });

            const aggregatePendamping = filteredKomponen.reduce((acc, curr) => { const p = curr.pendamping || 'Tanpa Nama'; acc[p] = (acc[p] || 0) + 1; return acc; }, {});
            const aggregateBentukTingkat = filteredKomponen.reduce((acc, curr) => {
                const bentuk = curr.bentuk || 'Lainnya'; const tingkat = curr.tingkat || 'Lainnya';
                if (!acc[bentuk]) acc[bentuk] = {}; acc[bentuk][tingkat] = (acc[bentuk][tingkat] || 0) + 1;
                return acc;
            }, {});

            const arsipDokumen = currentRecords.reduce((acc, current) => {
                if (!current) return acc;
                const key = `${current.sekolah}-${current.bulan}-${current.tahun}-${current.pendamping}`;
                if (!acc[key]) acc[key] = current; return acc;
            }, {});
            
            const arsipUnik = Object.values(arsipDokumen);
            const filteredArsip = arsipUnik.filter(item => String(item.sekolah || '').toLowerCase().includes(searchArsip.toLowerCase()) || String(item.pendamping || '').toLowerCase().includes(searchArsip.toLowerCase()));

            const totalSekolahUnik = new Set(arsipUnik.map(a => a.sekolah)).size;
            const totalPendampingAktif = new Set(arsipUnik.map(a => a.pendamping)).size;

            const exportToExcel = () => {
                if (filteredKomponen.length === 0) return showToast("Tidak ada data", 'error');
                try {
                    const wsData = filteredKomponen.map((r, i) => ({ "No": i + 1, "Sekolah": r.sekolah, "Periode": `${r.bulan} ${r.tahun}`, "Pendamping": r.pendamping, "NIK Pengurus": r.nik_pengurus, "Nama Pengurus": r.nama_pengurus, "NIK Siswa": r.nik_siswa, "NISN": r.nisn, "Nama Siswa": r.nama_siswa, "Bentuk": r.bentuk, "Tingkat": r.tingkat }));
                    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(wsData), "Data");
                    XLSX.writeFile(wb, `Data_Komponen_${new Date().getTime()}.xlsx`);
                } catch (e) { showToast("Gagal mengekspor Excel", "error"); }
            };

            const exportToPDF = () => {
                if (filteredKomponen.length === 0) return showToast("Tidak ada data", 'error');
                try {
                    const doc = new window.jspdf.jsPDF('l', 'mm', 'a4');
                    doc.setFont('helvetica', 'bold'); doc
