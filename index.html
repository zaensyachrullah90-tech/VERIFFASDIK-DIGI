<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VerifDigi Pro - Enterprise Edition</title>
    
    <!-- TIFP: Pengaturan Font Premium -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- TIFP: Tailwind CSS untuk Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    fontFamily: { sans: ['Inter', 'sans-serif'] }, 
                    colors: { 
                        brand: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a' } 
                    } 
                } 
            }
        }
    </script>
    
    <!-- TIFP: Core React Libraries (Versi Stabil Cloudflare CDN) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>
    
    <!-- TIFP: Libraries untuk Ekspor Excel dan PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>

    <style>
        /* TIFP: Styling Custom CSS yang Elegan */
        body { background: #f8fafc; color: #0f172a; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
        
        /* Custom Scrollbar Premium */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        
        /* Glassmorphism Panel */
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
        
        /* Animasi Halus */
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.5s ease-out forwards; }
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Loader Spinner Custom */
        .loader { border: 4px solid #e2e8f0; border-bottom-color: #2563eb; border-radius: 50%; display: inline-block; box-sizing: border-box; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- Target Render React -->
    <div id="root"></div>

    <script type="text/babel">
        // =========================================================================================
        // 1. PENGATURAN URL BACKEND (GOOGLE APPS SCRIPT)
        // =========================================================================================
        // URL ini persis seperti yang Anda minta.
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw-Ez4pHMQ7aZycAoF9-Pz-p9bEmSBc0LSQuAQwdvFMntdwQ24_5rRSZ0KQVUgQbFzF/exec"; 

        const { useState, useEffect, useRef, useMemo } = React;

        // =========================================================================================
        // 2. KOMPONEN IKON SVG (LUCIDE INSPIRED)
        // =========================================================================================
        const Icons = {
            Upload: (p) => <svg {...p} width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
            Scan: (p) => <svg {...p} width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><rect x="7" y="7" width="10" height="10" rx="1"/></svg>,
            Database: (p) => <svg {...p} width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>,
            Chart: (p) => <svg {...p} width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>,
            Archive: (p) => <svg {...p} width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="4" width="20" height="5" rx="2"/><path d="M4 9v9a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9"/><line x1="10" y1="13" x2="14" y2="13"/></svg>,
            Search: (p) => <svg {...p} width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
            Check: ({className, ...p}) => <svg {...p} width="32" height="32" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className || "text-emerald-500"}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
            PDF: (p) => <svg {...p} width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M9 15v-4"/><path d="M12 15v-4"/><path d="M15 15v-4"/></svg>,
            Excel: (p) => <svg {...p} width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/></svg>,
            Pages: (p) => <svg {...p} width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M16 22H4a2 2 0 0 1-2-2V6"/></svg>,
            User: (p) => <svg {...p} width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Settings: (p) => <svg {...p} width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        };

        // =========================================================================================
        // 3. KOMPONEN UI GLOBAL (TOAST, TAB, FILTER)
        // =========================================================================================
        const Toast = ({ message, type, onClose }) => {
            useEffect(() => { 
                const timer = setTimeout(onClose, 5000); 
                return () => clearTimeout(timer); 
            }, [onClose]);
            
            const bgClass = type === 'error' ? 'bg-red-600' : type === 'success' ? 'bg-emerald-600' : 'bg-slate-800';
            
            return (
                <div className={`fixed bottom-6 right-6 z-[999] ${bgClass} text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 animate-slide-up max-w-md border border-white/20`}>
                    {type === 'success' && <Icons.Check className="w-6 h-6 text-white" />}
                    <span className="font-semibold text-sm break-words">{message}</span>
                    <button onClick={onClose} className="ml-auto text-white/70 hover:text-white transition-colors">✕</button>
                </div>
            );
        };

        const TabBtn = ({ id, label, icon: Icon, activeTab, setActiveTab }) => {
            const isActive = activeTab === id;
            return (
                <button 
                    onClick={() => setActiveTab(id)} 
                    className={`flex items-center gap-2.5 px-6 py-3.5 text-sm font-bold rounded-xl transition-all duration-300 ${isActive ? 'bg-white shadow-lg shadow-slate-200/50 text-brand-600 scale-105' : 'text-slate-500 hover:text-slate-800 hover:bg-slate-100/80'}`}
                >
                    <Icon className={`w-5 h-5 ${isActive ? 'text-brand-600' : 'text-slate-400'}`} /> 
                    {label}
                </button>
            );
        };

        // =========================================================================================
        // 4. APLIKASI UTAMA (MAIN APP COMPONENT)
        // =========================================================================================
        function App() {
            // --- STATE: NAVIGASI ---
            const [activeTab, setActiveTab] = useState('upload'); 
            
            // --- STATE: PENGATURAN URL (FLEXIBLE) ---
            const [showSettings, setShowSettings] = useState(false);
            const [backendUrl, setBackendUrl] = useState(localStorage.getItem('VERIFDIGI_BACKEND_URL') || GAS_WEB_APP_URL);
            const [tempUrl, setTempUrl] = useState(backendUrl);

            // --- STATE: PROSES UPLOAD & AI ---
            const [uploadState, setUploadState] = useState('idle'); // idle, processing_image, extracting, form, saving, success
            const [processedImages, setProcessedImages] = useState([]); // Base64 Array
            const [extractedData, setExtractedData] = useState({ sekolah: '', bulan: '', tahun: '', siswa: [] });
            
            // --- STATE: DATABASE SPREADSHEET ---
            const [records, setRecords] = useState([]);
            const [loadingData, setLoadingData] = useState(false);
            
            // --- STATE: UI HELPERS ---
            const [toast, setToast] = useState(null);
            
            // --- STATE: FILTERING & SEARCH ---
            const [filterPendamping, setFilterPendamping] = useState('');
            const [filterBentuk, setFilterBentuk] = useState('');
            const [filterTingkat, setFilterTingkat] = useState('');
            const [searchQuery, setSearchQuery] = useState('');
            const [searchArsip, setSearchArsip] = useState('');

            // --- REFS ---
            const fileInputRef = useRef(null);
            const canvasRef = useRef(null);

            // Helper Pemanggil Toast
            const showToast = (message, type = 'success') => setToast({ message, type });

            // Pengambilan Data Pertama Kali
            useEffect(() => {
                if (activeTab !== 'upload' && activeTab !== 'settings' && records.length === 0) {
                    fetchData();
                }
            }, [activeTab]);

            // Menyimpan Pengaturan URL
            const saveSettings = () => {
                localStorage.setItem('VERIFDIGI_BACKEND_URL', tempUrl);
                setBackendUrl(tempUrl);
                setShowSettings(false);
                showToast('URL Backend berhasil disimpan ke perangkat!', 'success');
            };

            // =====================================================================================
            // LOGIKA 1: PEMROSESAN GAMBAR (CANVAS COMPRESSION & FILTER)
            // =====================================================================================
            const handleFileChange = async (e) => {
                const files = Array.from(e.target.files || []);
                if (files.length === 0) return;
                
                if (!backendUrl) {
                    setShowSettings(true);
                    return showToast('PENTING: Harap masukkan URL Backend Google Apps Script terlebih dahulu!', 'error');
                }
                
                setUploadState('processing_image');
                const base64Array = [];

                // Proses file satu persatu untuk mencegah hang
                for (let file of files) {
                    try {
                        const base64 = await processSingleImage(file);
                        base64Array.push(base64);
                    } catch (error) {
                        console.error("Gagal memproses satu gambar", error);
                    }
                }

                if (base64Array.length === 0) {
                    setUploadState('idle');
                    return showToast('Gagal memproses gambar. Pastikan format foto benar.', 'error');
                }

                setProcessedImages(base64Array);
                extractTextFromMultipleImages(base64Array);
            };

            // Membuat gambar sangat tajam tapi ringan (Mode Scanner)
            const processSingleImage = (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            try {
                                const canvas = document.createElement('canvas');
                                const ctx = canvas.getContext('2d');
                                
                                // Resolusi maksimal 1800px agar tulisan kecil terbaca jelas oleh AI
                                const maxWidth = 1800; 
                                let width = img.width, height = img.height;
                                if (width > maxWidth) { 
                                    height = Math.round((height * maxWidth) / width); 
                                    width = maxWidth; 
                                }
                                
                                canvas.width = width; 
                                canvas.height = height;
                                
                                // Filter CamScanner Mode (Grayscale & High Contrast)
                                ctx.filter = 'grayscale(100%) contrast(160%) brightness(105%)'; 
                                ctx.drawImage(img, 0, 0, width, height);
                                
                                // Return Base64 dengan kualitas 80% (Hemat bandwidth)
                                resolve(canvas.toDataURL('image/jpeg', 0.8)); 
                            } catch (e) {
                                reject(e);
                            }
                        };
                        img.onerror = reject;
                        img.src = event.target.result;
                    };
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            };

            // =====================================================================================
            // LOGIKA 2: EKSTRAKSI TEKS MULTI-HALAMAN VIA AI BACKEND
            // =====================================================================================
            const extractTextFromMultipleImages = async (base64Array) => {
                setUploadState('extracting');
                try {
                    // Hilangkan prefix data url untuk dikirim ke API
                    const cleanBase64Array = base64Array.map(img => img.split(',')[1]);
                    
                    const res = await fetch(backendUrl, {
                        method: 'POST', 
                        body: JSON.stringify({ action: 'extract_multiple', images: cleanBase64Array }), 
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                    });
                    
                    const data = await res.json();

                    if (data.status === 'success') {
                        // Perlindungan Anti-Crash (Fallback jika AI mengembalikan undefined)
                        const safeData = {
                            sekolah: data.data.sekolah || 'TIDAK TERBACA',
                            bulan: data.data.bulan || '-',
                            tahun: data.data.tahun || '-',
                            siswa: Array.isArray(data.data.siswa) ? data.data.siswa : [] 
                        };
                        
                        setExtractedData(safeData);
                        setUploadState('form');
                        showToast(`Luar Biasa! Berhasil membaca ${safeData.siswa.length} baris data dari ${base64Array.length} foto!`, 'success');
                    } else {
                        throw new Error(data.message || "Unknown Error dari Server AI");
                    }
                } catch (err) {
                    console.error(err);
                    showToast('Gagal terhubung ke AI Backend: ' + err.message, 'error');
                    setUploadState('idle');
                }
            };

            // =====================================================================================
            // LOGIKA 3: PEMBUATAN PDF LOKAL DAN PENYIMPANAN KE DATABASE
            // =====================================================================================
            const handleSave = async (e) => {
                e.preventDefault();
                setUploadState('saving');

                try {
                    // Validasi Library jsPDF ter-load
                    if (!window.jspdf || !window.jspdf.jsPDF) {
                        throw new Error("Library PDF gagal dimuat. Periksa koneksi internet Anda.");
                    }

                    // 1. Render PDF dari Gambar-gambar yang diunggah
                    const doc = new window.jspdf.jsPDF('p', 'mm', 'a4');
                    
                    processedImages.forEach((imgBase64, index) => {
                        if (index > 0) doc.addPage();
                        const imgProps = doc.getImageProperties(imgBase64);
                        const pdfWidth = doc.internal.pageSize.getWidth();
                        const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
                        
                        // Posisi (0,0) ukuran penuh kertas
                        doc.addImage(imgBase64, 'JPEG', 0, 0, pdfWidth, pdfHeight);
                    });

                    // 2. Ekstrak Base64 PDF untuk dikirim ke Google Drive
                    const pdfBase64Data = doc.output('datauristring').split(',')[1];
                    
                    // 3. Susun Payload Data
                    const payload = { 
                        action: 'save', 
                        pdfBase64: pdfBase64Data, 
                        sekolah: extractedData.sekolah, 
                        bulan: extractedData.bulan, 
                        tahun: extractedData.tahun, 
                        siswa: extractedData.siswa || [] 
                    };
                    
                    // 4. Kirim ke Backend Google Apps Script
                    const res = await fetch(backendUrl, { 
                        method: 'POST', 
                        body: JSON.stringify(payload), 
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                    });
                    
                    const resData = await res.json();
                    
                    if (resData.status !== 'success') {
                        throw new Error(resData.message || "Gagal menyimpan ke Google Sheets/Drive.");
                    }
                    
                    // 5. Sukses! Refresh data dashboard
                    fetchData(); 
                    setUploadState('success');
                    showToast('Semua data berhasil masuk ke Spreadsheet dan PDF tersimpan di Drive!', 'success');
                    
                } catch (err) {
                    console.error(err);
                    showToast('Terjadi kesalahan saat menyimpan: ' + err.message, 'error');
                    setUploadState('form');
                }
            };

            // =====================================================================================
            // LOGIKA 4: MENGAMBIL DATA DARI GOOGLE SHEETS
            // =====================================================================================
            const fetchData = async () => {
                if (!backendUrl) return;
                setLoadingData(true);
                try {
                    const res = await fetch(`${backendUrl}?action=getRecords`);
                    const result = await res.json();
                    if (result.status === 'success') {
                        // Pastikan selalu array untuk menghindari crash .filter() / .map()
                        setRecords(Array.isArray(result.data) ? result.data : []);
                    } else {
                        showToast("Gagal memuat: " + result.message, 'error');
                    }
                } catch (error) { 
                    console.error(error);
                    showToast("Gagal memuat database dari server Google. Periksa URL Anda.", 'error'); 
                } finally { 
                    setLoadingData(false); 
                }
            };

            // Reset Aplikasi untuk Upload Baru
            const resetForm = () => { 
                setUploadState('idle'); 
                setExtractedData({ sekolah: '', bulan: '', tahun: '', siswa: [] }); 
                setProcessedImages([]); 
            };

            // =====================================================================================
            // LOGIKA 5: FILTERING & AGREGASI DATA (DIAMANKAN DARI CRASH UNDEFINED)
            // =====================================================================================
            const currentRecords = Array.isArray(records) ? records : [];
            
            // Mengambil Opsi Unik untuk Dropdown Filter
            const optionsPendamping = [...new Set(currentRecords.map(r => r?.pendamping))].filter(Boolean);
            const optionsBentuk = [...new Set(currentRecords.map(r => r?.bentuk))].filter(Boolean);
            const optionsTingkat = [...new Set(currentRecords.map(r => r?.tingkat))].filter(Boolean);

            // Filter Tabel Komponen (Database & Statistik)
            const filteredKomponen = currentRecords.filter(item => {
                if (!item) return false;
                
                // Pencarian Global (Search Input)
                const matchSearch = Object.values(item).some(val => 
                    String(val || '').toLowerCase().includes(searchQuery.toLowerCase())
                );
                
                // Filter Spesifik (Dropdowns)
                const matchPendamping = filterPendamping ? item.pendamping === filterPendamping : true;
                const matchBentuk = filterBentuk ? item.bentuk === filterBentuk : true;
                const matchTingkat = filterTingkat ? item.tingkat === filterTingkat : true;
                
                return matchSearch && matchPendamping && matchBentuk && matchTingkat;
            });

            // Agregasi Top Surveyor (Pendamping dengan siswa terbanyak)
            const aggregatePendamping = filteredKomponen.reduce((acc, curr) => { 
                const p = curr.pendamping || 'Tanpa Nama';
                acc[p] = (acc[p] || 0) + 1; 
                return acc; 
            }, {});
            
            // Agregasi Bertingkat (Jenjang -> Kelas -> Jumlah)
            const aggregateBentukTingkat = filteredKomponen.reduce((acc, curr) => {
                const bentuk = curr.bentuk || 'Lainnya'; 
                const tingkat = curr.tingkat || 'Lainnya';
                if (!acc[bentuk]) acc[bentuk] = {}; 
                acc[bentuk][tingkat] = (acc[bentuk][tingkat] || 0) + 1;
                return acc;
            }, {});

            // Filter Arsip Dokumen (Satu baris mewakili 1 file PDF Sekolah)
            const arsipDokumen = currentRecords.reduce((acc, current) => {
                if (!current) return acc;
                // Kunci unik dokumen berdasarkan sekolah + bulan + tahun + pendamping
                const key = `${current.sekolah}-${current.bulan}-${current.tahun}-${current.pendamping}`;
                if (!acc[key]) acc[key] = current; 
                return acc;
            }, {});
            
            const arsipUnik = Object.values(arsipDokumen);
            
            // Filter Pencarian Arsip PDF
            const filteredArsip = arsipUnik.filter(item => 
                String(item.sekolah || '').toLowerCase().includes(searchArsip.toLowerCase()) || 
                String(item.pendamping || '').toLowerCase().includes(searchArsip.toLowerCase())
            );

            const totalSekolahUnik = new Set(arsipUnik.map(a => a.sekolah)).size;
            const totalPendampingAktif = new Set(arsipUnik.map(a => a.pendamping)).size;

            // =====================================================================================
            // LOGIKA 6: EXPORT EXCEL & CETAK PDF
            // =====================================================================================
            const exportToExcel = () => {
                if (filteredKomponen.length === 0) return showToast("Tidak ada data untuk diekspor", 'error');
                if (!window.XLSX) return showToast("Library Excel gagal dimuat. Coba refresh halaman.", 'error');

                try {
                    const wsData = filteredKomponen.map((r, i) => ({ 
                        "No": i + 1, 
                        "Nama Sekolah": r.sekolah, 
                        "Periode": `${r.bulan} ${r.tahun}`, 
                        "Pendamping": r.pendamping, 
                        "NIK Pengurus": r.nik_pengurus, 
                        "Nama Pengurus": r.nama_pengurus, 
                        "NIK Siswa": r.nik_siswa, 
                        "NISN": r.nisn, 
                        "Nama Siswa": r.nama_siswa, 
                        "Bentuk": r.bentuk, 
                        "Tingkat": r.tingkat 
                    }));
                    
                    const wb = XLSX.utils.book_new();
                    const ws = XLSX.utils.json_to_sheet(wsData);
                    
                    // Styling Header Sederhana
                    const headerRange = XLSX.utils.decode_range(ws['!ref']);
                    for (let C = headerRange.s.c; C <= headerRange.e.c; ++C) {
                        const address = XLSX.utils.encode_col(C) + "1";
                        if (!ws[address]) continue;
                        ws[address].v = String(ws[address].v).toUpperCase();
                    }

                    XLSX.utils.book_append_sheet(wb, ws, "Data Komponen");
                    XLSX.writeFile(wb, `Data_Komponen_${new Date().toISOString().split('T')[0]}.xlsx`);
                    showToast("Berhasil mendownload Excel!", "success");
                } catch (e) {
                    console.error(e);
                    showToast("Gagal mengekspor Excel: " + e.message, "error");
                }
            };

            const exportToPDF = () => {
                if (filteredKomponen.length === 0) return showToast("Tidak ada data untuk dicetak", 'error');
                if (!window.jspdf || !window.jspdf.jsPDF || !window.jspdf.jsPDF.prototype.autoTable) {
                    return showToast("Library PDF/AutoTable gagal dimuat.", 'error');
                }

                try {
                    const doc = new window.jspdf.jsPDF('l', 'mm', 'a4'); // Landscape agar tabel muat
                    
                    // Header Dokumen
                    doc.setFont('helvetica', 'bold'); 
                    doc.setFontSize(16); 
                    doc.text("Laporan Data Komponen Verifikasi", 14, 15);
                    
                    // Sub-Header
                    doc.setFont('helvetica', 'normal'); 
                    doc.setFontSize(10); 
                    doc.text(`Total Data: ${filteredKomponen.length} Siswa  |  Filter Pendamping: ${filterPendamping || 'Semua'}`, 14, 22);
                    doc.text(`Tanggal Cetak: ${new Date().toLocaleDateString('id-ID')}`, 14, 27);
                    
                    // Generate Tabel
                    const tableData = filteredKomponen.map((r, i) => [ 
                        i + 1, 
                        r.sekolah, 
                        r.pendamping, 
                        r.nama_pengurus, 
                        r.nisn, 
                        r.nama_siswa, 
                        r.bentuk, 
                        r.tingkat 
                    ]);

                    doc.autoTable({ 
                        head: [['No', 'Asal Sekolah', 'Pendamping', 'Nama Pengurus', 'NISN Siswa', 'Nama Siswa', 'Bentuk', 'Kelas']], 
                        body: tableData, 
                        startY: 32, 
                        theme: 'grid', 
                        styles: { fontSize: 8, cellPadding: 2, font: 'helvetica' }, 
                        headStyles: { fillColor: [37, 99, 235], textColor: [255,255,255], fontStyle: 'bold' },
                        alternateRowStyles: { fillColor: [248, 250, 252] }
                    });
                    
                    doc.save(`Laporan_VerifDigi_${new Date().getTime()}.pdf`);
                    showToast("Berhasil mendownload PDF!", "success");
                } catch (e) {
                    console.error(e);
                    showToast("Gagal mencetak PDF: " + e.message, "error");
                }
            };

            // =====================================================================================
            // KOMPONEN RENDER (UI FRAGMENTS)
            // =====================================================================================
            
            // Komponen: Baris Filter Interaktif (Digunakan di Statistik & Database)
            const renderFilterBar = () => (
                <div className="grid grid-cols-1 md:grid-cols-4 gap-4 bg-white p-5 rounded-2xl shadow-sm border border-slate-100 mb-6 animate-fade-in">
                    <div className="relative">
                        <Icons.Search className="absolute left-4 top-3.5 text-slate-400 w-5 h-5" />
                        <input type="text" placeholder="Cari nama, nisn, nik..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none transition-shadow font-semibold text-slate-800" />
                    </div>
                    <select value={filterPendamping} onChange={e => setFilterPendamping(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none font-bold text-slate-700 cursor-pointer hover:bg-slate-100 transition-colors">
                        <option value="">Semua Pendamping</option>
                        {optionsPendamping.map((opt, i) => <option key={i} value={opt}>{opt}</option>)}
                    </select>
                    <select value={filterBentuk} onChange={e => setFilterBentuk(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none font-bold text-slate-700 cursor-pointer hover:bg-slate-100 transition-colors">
                        <option value="">Semua Jenjang (Bentuk)</option>
                        {optionsBentuk.map((opt, i) => <option key={i} value={opt}>{opt}</option>)}
                    </select>
                    <select value={filterTingkat} onChange={e => setFilterTingkat(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none font-bold text-slate-700 cursor-pointer hover:bg-slate-100 transition-colors">
                        <option value="">Semua Kelas</option>
                        {optionsTingkat.map((opt, i) => <option key={i} value={opt}>{opt}</option>)}
                    </select>
                </div>
            );

            // =====================================================================================
            // RENDER HTML UTAMA
            // =====================================================================================
            return (
                <div className="min-h-screen flex flex-col font-sans">
                    
                    {/* Komponen Toast Notifikasi */}
                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                    
                    {/* Canvas Tersembunyi untuk Image Processing */}
                    <canvas ref={canvasRef} className="hidden"></canvas>

                    {/* MODAL PENGATURAN SYSTEM (Tampil jika showSettings = true) */}
                    {showSettings && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 animate-fade-in">
                            <div className="bg-white rounded-[2rem] p-8 w-full max-w-xl shadow-2xl animate-slide-up border border-slate-100">
                                <div className="flex items-center gap-4 mb-6 text-brand-600 border-b border-slate-100 pb-5">
                                    <div className="bg-brand-50 p-3 rounded-2xl"><Icons.Settings className="w-8 h-8" /></div>
                                    <h2 className="text-2xl font-black text-slate-800 tracking-tight">Pengaturan Sistem</h2>
                                </div>
                                <div className="mb-8">
                                    <label className="block text-sm font-bold text-slate-700 mb-3 uppercase tracking-wider">URL Web App (Google Apps Script)</label>
                                    <input 
                                        type="text" 
                                        value={tempUrl} 
                                        onChange={e => setTempUrl(e.target.value)} 
                                        placeholder="https://script.google.com/macros/s/..." 
                                        className="w-full bg-slate-50 border-2 border-slate-200 rounded-2xl px-5 py-4 text-slate-800 font-medium focus:ring-4 focus:ring-brand-500/20 focus:border-brand-500 outline-none transition-all" 
                                    />
                                    <p className="text-sm text-slate-500 mt-4 leading-relaxed font-medium">Sistem VerifDigi Pro terhubung langsung dengan Google Cloud. Masukkan URL hasil deployment Google Apps Script Anda di sini agar aplikasi dapat berfungsi.</p>
                                </div>
                                <div className="flex gap-4 justify-end pt-2">
                                    <button onClick={() => setShowSettings(false)} className="px-8 py-4 bg-slate-100 hover:bg-slate-200 text-slate-700 font-black rounded-2xl transition-colors">Tutup</button>
                                    <button onClick={saveSettings} className="px-10 py-4 bg-brand-600 hover:bg-brand-700 text-white font-black rounded-2xl shadow-xl shadow-brand-500/30 transition-all hover:-translate-y-1">Simpan Koneksi API</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* TOP NAVIGATION HEADER */}
                    <header className="sticky top-0 z-40 glass-panel shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                            
                            <div className="flex items-center gap-3 text-brand-600 font-black text-2xl tracking-tight cursor-pointer hover:scale-105 transition-transform" onClick={() => setActiveTab('upload')}>
                                <div className="bg-gradient-to-br from-brand-500 to-brand-700 text-white p-2.5 rounded-xl shadow-lg shadow-brand-500/30">
                                    <Icons.Scan className="w-6 h-6"/>
                                </div>
                                <span>Verif<span className="text-slate-800">Digi Pro</span></span>
                            </div>
                            
                            <div className="flex items-center gap-2 w-full md:w-auto">
                                <nav className="flex p-1.5 bg-slate-100/70 rounded-2xl overflow-x-auto hide-scroll border border-slate-200/50 w-full md:w-auto">
                                    <TabBtn id="upload" label="Scan AI" icon={Icons.Upload} activeTab={activeTab} setActiveTab={setActiveTab} />
                                    <TabBtn id="dashboard_komponen" label="Statistik" icon={Icons.Chart} activeTab={activeTab} setActiveTab={setActiveTab} />
                                    <TabBtn id="data_komponen" label="Database" icon={Icons.Database} activeTab={activeTab} setActiveTab={setActiveTab} />
                                    <TabBtn id="dashboard_arsip" label="Dashboard Arsip" icon={Icons.Archive} activeTab={activeTab} setActiveTab={setActiveTab} />
                                    <TabBtn id="arsip_pdf" label="Arsip PDF" icon={Icons.PDF} activeTab={activeTab} setActiveTab={setActiveTab} />
                                </nav>
                                
                                {/* Tombol Settings Panel */}
                                <button onClick={() => setShowSettings(true)} className="p-3.5 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-2xl transition-all hover:rotate-90 ml-2 shadow-sm border border-slate-200" title="Pengaturan URL API">
                                    <Icons.Settings className="w-5 h-5" />
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* MAIN CONTENT AREA */}
                    <main className="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full">
                        
                        {/* ========================================================= */}
                        {/* 1. VIEW: UPLOAD & SCAN AI                                 */}
                        {/* ========================================================= */}
                        {activeTab === 'upload' && (
                            <div className="max-w-4xl mx-auto animate-fade-in">
                                
                                {/* STATE: Pilihan File */}
                                {uploadState === 'idle' && (
                                    <div className="bg-white p-12 rounded-[3rem] shadow-2xl shadow-slate-200/50 border border-slate-100 text-center relative overflow-hidden group hover:border-brand-300 transition-colors duration-500">
                                        <div className="absolute inset-0 bg-gradient-to-br from-brand-50/50 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-700"></div>
                                        <div className="relative z-10">
                                            <div className="mx-auto w-28 h-28 bg-brand-50 text-brand-600 rounded-[2rem] flex items-center justify-center mb-10 shadow-inner shadow-brand-200 border border-brand-100 group-hover:-translate-y-2 transition-transform duration-500"><Icons.Pages className="w-12 h-12"/></div>
                                            <h2 className="text-5xl font-black text-slate-800 mb-6 tracking-tight">Scan Lintas Halaman</h2>
                                            <p className="text-slate-500 text-xl mb-12 max-w-xl mx-auto leading-relaxed font-medium">Pilih 1 atau puluhan halaman foto sekaligus. AI akan membaca seluruh baris tabel secara presisi dan mengekstrak NIK, NISN, hingga Pendamping.</p>
                                            
                                            <input type="file" multiple accept="image/*" capture="environment" className="hidden" ref={fileInputRef} onChange={handleFileChange} />
                                            
                                            <button onClick={() => fileInputRef.current.click()} className="bg-brand-600 hover:bg-brand-700 text-white font-black text-xl py-6 px-16 rounded-[2rem] shadow-2xl shadow-brand-500/40 transition-all hover:-translate-y-2 hover:scale-105 active:scale-95 flex items-center justify-center gap-3 mx-auto">
                                                <Icons.Scan className="w-6 h-6" /> Pilih Foto Dokumen
                                            </button>
                                            
                                            {!backendUrl && (
                                                <div onClick={() => setShowSettings(true)} className="mt-10 cursor-pointer animate-pulse-slow inline-flex items-center gap-2 px-6 py-4 bg-red-50 border border-red-200 text-red-600 rounded-2xl text-sm font-bold shadow-sm hover:bg-red-100 transition-colors">
                                                    ⚠️ PERHATIAN: URL Backend Belum Disetel! Klik untuk Mengatur.
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}

                                {/* STATE: Loading Proses AI */}
                                {(uploadState === 'processing_image' || uploadState === 'extracting' || uploadState === 'saving') && (
                                    <div className="bg-white p-24 rounded-[3rem] shadow-2xl border border-slate-100 text-center animate-slide-up">
                                        <div className="mb-10"><span className="loader w-24 h-24 border-[6px]"></span></div>
                                        <h2 className="text-3xl font-black text-slate-800 tracking-tight mb-4">
                                            {uploadState === 'processing_image' ? `Memproses ${fileInputRef.current?.files.length || 0} Halaman Resolusi Tinggi...` : 
                                             uploadState === 'extracting' ? 'AI Membaca Setiap Baris Tabel Lintas Halaman...' : 
                                             'Menyatukan ke PDF & Menyimpan ke Database Server...'}
                                        </h2>
                                        <p className="text-slate-500 text-lg font-medium">Proses ini mungkin memakan waktu beberapa detik. Sistem memastikan tidak ada baris tabel yang tertinggal.</p>
                                    </div>
                                )}

                                {/* STATE: Verifikasi Form Hasil AI */}
                                {uploadState === 'form' && (
                                    <div className="bg-white rounded-[3rem] shadow-2xl border border-slate-100 overflow-hidden animate-slide-up">
                                        <div className="bg-slate-50 px-12 py-10 border-b border-slate-200 flex flex-col md:flex-row justify-between md:items-center gap-4">
                                            <div>
                                                <h2 className="text-4xl font-black text-slate-800 tracking-tight">Verifikasi Data AI</h2>
                                                <p className="text-slate-500 font-bold mt-2">Diekstrak dari {processedImages.length} Halaman Foto Dokumen.</p>
                                            </div>
                                            <div className="bg-brand-600 text-white px-6 py-3 rounded-2xl font-black text-xl shadow-lg shadow-brand-500/30 border border-brand-500">
                                                {(extractedData.siswa || []).length} Baris Terdeteksi
                                            </div>
                                        </div>
                                        
                                        <form onSubmit={handleSave} className="p-12 space-y-10">
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 bg-slate-50/50 p-8 rounded-3xl border border-slate-100">
                                                <div className="md:col-span-2">
                                                    <label className="block text-xs font-black text-slate-400 uppercase tracking-widest mb-3">Nama Sekolah (Terbaca dari Kop)</label>
                                                    <div className="w-full bg-white border border-slate-200 rounded-2xl px-6 py-5 text-slate-800 font-black text-xl shadow-sm">{extractedData.sekolah || 'Tidak Terdeteksi'}</div>
                                                </div>
                                                <div className="md:col-span-2">
                                                    <label className="block text-xs font-black text-slate-400 uppercase tracking-widest mb-3">Periode Validasi</label>
                                                    <div className="w-full bg-white border border-slate-200 rounded-2xl px-6 py-5 text-slate-800 font-black text-xl shadow-sm">{extractedData.bulan} {extractedData.tahun}</div>
                                                </div>
                                            </div>
                                            
                                            <div>
                                                <div className="flex items-center justify-between mb-5 mt-6 border-b border-slate-100 pb-4">
                                                    <h3 className="text-lg font-black text-slate-800 uppercase tracking-tight">Tabel Data Siswa & Pendamping</h3>
                                                </div>
                                                <div className="max-h-[28rem] overflow-y-auto space-y-4 pr-3 custom-scrollbar bg-slate-50 p-6 rounded-[2rem] border border-slate-200 shadow-inner">
                                                    {(extractedData.siswa || []).map((s, i) => (
                                                        <div key={i} className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between md:items-center gap-6 hover:border-brand-400 transition-colors group">
                                                            <div className="flex-1">
                                                                <div className="font-black text-slate-800 text-xl flex items-start gap-3">
                                                                    <span className="bg-slate-800 text-white w-8 h-8 flex items-center justify-center rounded-xl text-sm shrink-0">{i+1}</span> 
                                                                    <span className="group-hover:text-brand-600 transition-colors leading-tight">{s.nama_siswa}</span>
                                                                </div>
                                                                <div className="text-sm text-slate-500 font-bold mt-3 ml-11">NISN: <span className="text-slate-700 bg-slate-100 px-2 py-0.5 rounded">{s.nisn}</span> | NIK: <span className="text-slate-700 bg-slate-100 px-2 py-0.5 rounded">{s.nik_siswa}</span></div>
                                                                <div className="text-sm text-brand-700 font-black mt-3 ml-11 bg-brand-50 border border-brand-200 inline-flex items-center gap-2 px-4 py-2 rounded-xl shadow-sm"><Icons.User className="w-4 h-4 text-brand-500" /> PENDAMPING: {s.pendamping || 'Kosong'}</div>
                                                            </div>
                                                            <div className="text-left md:text-right ml-11 md:ml-0 flex flex-col justify-between h-full">
                                                                <div className="inline-flex items-center justify-start md:justify-end gap-2 bg-slate-100 text-slate-700 px-4 py-2 rounded-xl text-sm font-black border border-slate-200 w-fit md:ml-auto">
                                                                    <span>{s.bentuk}</span><span className="w-1.5 h-1.5 rounded-full bg-slate-400"></span><span>{s.tingkat}</span>
                                                                </div>
                                                                <div className="text-xs text-slate-400 font-bold mt-4 bg-slate-50 p-2 rounded-lg border border-slate-100 inline-block">Wali/Pengurus: <strong className="text-slate-700 uppercase">{s.nama_pengurus}</strong></div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                    {(extractedData.siswa || []).length === 0 && (
                                                        <div className="text-center py-16 flex flex-col items-center">
                                                            <div className="w-16 h-16 bg-slate-200 rounded-full flex items-center justify-center text-slate-400 mb-4 text-2xl">?</div>
                                                            <div className="text-slate-500 font-black text-xl">Tidak ada baris tabel yang terbaca.</div>
                                                            <p className="text-slate-400 mt-2 font-medium">Pastikan foto form jelas, terang, dan tidak terpotong.</p>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                            
                                            <div className="flex flex-col sm:flex-row gap-5 pt-10 border-t border-slate-200 mt-10">
                                                <button type="button" onClick={resetForm} className="px-10 py-6 bg-slate-100 hover:bg-slate-200 text-slate-600 font-black rounded-2xl transition-colors w-full sm:w-auto text-lg">Batalkan</button>
                                                <button type="submit" className="flex-1 bg-brand-600 hover:bg-brand-700 text-white font-black text-xl py-6 px-10 rounded-2xl shadow-xl shadow-brand-500/30 transition-all hover:-translate-y-1 w-full sm:w-auto">Simpan Data & PDF ke Server</button>
                                            </div>
                                        </form>
                                    </div>
                                )}

                                {/* STATE: Sukses */}
                                {uploadState === 'success' && (
                                    <div className="bg-white p-20 rounded-[3rem] shadow-2xl border border-slate-100 text-center animate-slide-up relative overflow-hidden">
                                        <div className="absolute top-0 left-0 w-full h-4 bg-emerald-500"></div>
                                        <div className="flex justify-center mb-10"><Icons.Check className="w-24 h-24 text-emerald-500 bg-emerald-50 p-4 rounded-full" /></div>
                                        <h2 className="text-5xl font-black text-slate-800 mb-6 tracking-tight">Sukses Disimpan!</h2>
                                        <p className="text-slate-500 mb-14 text-xl font-medium max-w-lg mx-auto leading-relaxed">Data tabel telah masuk ke Google Sheets dan file PDF utuh telah diarsipkan ke Google Drive.</p>
                                        <div className="flex flex-col sm:flex-row justify-center gap-5">
                                            <button onClick={resetForm} className="bg-slate-100 text-slate-700 font-black text-lg py-5 px-12 rounded-2xl hover:bg-slate-200 transition-colors">Scan Dokumen Lain</button>
                                            <button onClick={() => setActiveTab('data_komponen')} className="bg-brand-600 text-white font-black text-lg py-5 px-12 rounded-2xl shadow-xl shadow-brand-500/30 hover:bg-brand-700 transition-all hover:-translate-y-1">Lihat Database Live</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ========================================================= */}
                        {/* 2. VIEW: STATISTIK KOMPONEN                               */}
                        {/* ========================================================= */}
                        {activeTab === 'dashboard_komponen' && (
                            <div className="animate-fade-in">
                                <div className="mb-10 border-b border-slate-200 pb-6 flex items-end gap-4">
                                    <div className="bg-brand-100 p-4 rounded-2xl"><Icons.Chart className="w-8 h-8 text-brand-600" /></div>
                                    <div>
                                        <h2 className="text-4xl font-black text-slate-800 tracking-tight mb-2">Statistik Komponen</h2>
                                        <p className="text-slate-500 text-lg font-medium">Visualisasi data siswa berdasarkan filter interaktif (Real-time).</p>
                                    </div>
                                </div>
                                
                                {renderFilterBar()}
                                
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                    <div className="lg:col-span-1 space-y-8">
                                        {/* Widget Total */}
                                        <div className="bg-gradient-to-br from-brand-600 to-indigo-800 rounded-[2.5rem] p-10 text-white shadow-2xl shadow-brand-500/20 relative overflow-hidden group">
                                            <div className="relative z-10">
                                                <div className="text-brand-100 font-bold uppercase tracking-widest text-sm mb-3">Total Siswa Terfilter</div>
                                                <div className="text-[5.5rem] leading-none font-black">{filteredKomponen.length}</div>
                                            </div>
                                            <div className="absolute -right-10 -bottom-10 opacity-20 text-[12rem] group-hover:scale-110 transition-transform duration-700 pointer-events-none">📈</div>
                                        </div>
                                        
                                        {/* Widget Top Surveyor */}
                                        <div className="bg-white rounded-[2.5rem] p-8 shadow-lg shadow-slate-200/40 border border-slate-100">
                                            <h3 className="font-black text-slate-800 mb-6 text-xl flex items-center gap-3"><Icons.User className="w-6 h-6 text-brand-500"/> Top Surveyor Aktif</h3>
                                            <div className="space-y-4 max-h-[22rem] overflow-y-auto custom-scrollbar pr-2">
                                                {Object.entries(aggregatePendamping).sort((a,b) => b[1] - a[1]).map(([key, val], idx) => (
                                                    <div key={key} className="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border border-slate-100 hover:border-brand-200 transition-colors group">
                                                        <div className="flex items-center gap-3">
                                                            <span className="text-xs font-bold text-slate-400 w-5">{idx+1}.</span>
                                                            <span className="font-bold text-slate-700 group-hover:text-brand-700 transition-colors truncate max-w-[150px]">{key}</span>
                                                        </div>
                                                        <span className="bg-white px-4 py-2 rounded-xl text-sm font-black text-brand-600 shadow-sm border border-slate-100">{val} Siswa</span>
                                                    </div>
                                                ))}
                                                {Object.keys(aggregatePendamping).length === 0 && <div className="text-slate-400 text-sm text-center py-10 font-bold bg-slate-50 rounded-2xl">Data Kosong</div>}
                                            </div>
                                        </div>
                                    </div>

                                    {/* Widget Distribusi Bentuk & Tingkat */}
                                    <div className="lg:col-span-2 bg-white rounded-[2.5rem] p-10 shadow-lg shadow-slate-200/40 border border-slate-100 flex flex-col">
                                        <h3 className="font-black text-slate-800 mb-8 text-2xl flex items-center gap-3 border-b border-slate-100 pb-6"><Icons.Database className="w-8 h-8 text-brand-500"/> Distribusi Jenjang & Kelas</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 overflow-y-auto custom-scrollbar flex-1 pr-2">
                                            {Object.entries(aggregateBentukTingkat).sort((a, b) => String(a[0]).localeCompare(String(b[0]))).map(([bentuk, tingkatData]) => (
                                                <div key={bentuk} className="bg-slate-50 border border-slate-100 p-8 rounded-3xl relative overflow-hidden group hover:border-brand-300 transition-colors shadow-sm hover:shadow-md h-fit">
                                                    <div className="absolute top-0 right-0 w-40 h-40 bg-brand-100/50 rounded-bl-full -mr-20 -mt-20 transition-transform group-hover:scale-150 duration-700 pointer-events-none"></div>
                                                    <div className="relative z-10">
                                                        <div className="flex justify-between items-end mb-8 border-b border-slate-200/80 pb-5">
                                                            <span className="font-black text-slate-800 text-[2.5rem] leading-none tracking-tight">{bentuk}</span>
                                                            <span className="bg-brand-600 text-white px-5 py-2.5 rounded-xl text-sm font-black shadow-md border border-brand-500">Total: {Object.values(tingkatData).reduce((a, b) => a + b, 0)}</span>
                                                        </div>
                                                        <div className="space-y-3">
                                                            {Object.entries(tingkatData).sort((a, b) => String(a[0]).localeCompare(String(b[0]))).map(([tingkat, count]) => (
                                                                <div key={tingkat} className="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-slate-100 hover:border-brand-200 transition-colors">
                                                                    <span className="text-slate-600 font-bold">{tingkat}</span>
                                                                    <span className="font-black text-slate-800 text-2xl bg-slate-50 px-3 py-1 rounded-lg">{count}</span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                            {Object.keys(aggregateBentukTingkat).length === 0 && <div className="text-slate-400 text-center py-20 col-span-2 font-bold text-xl bg-slate-50 rounded-3xl border border-dashed border-slate-200">Tidak ada data distribusi untuk filter ini.</div>}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ========================================================= */}
                        {/* 3. VIEW: DATA KOMPONEN (DATABASE TABEL)                   */}
                        {/* ========================================================= */}
                        {activeTab === 'data_komponen' && (
                            <div className="animate-fade-in flex flex-col h-[85vh]">
                                <div className="mb-8 border-b border-slate-200 pb-6 flex flex-col md:flex-row md:items-end justify-between gap-6">
                                    <div className="flex items-center gap-4">
                                        <div className="bg-emerald-100 p-4 rounded-2xl"><Icons.Database className="w-8 h-8 text-emerald-600" /></div>
                                        <div>
                                            <h2 className="text-4xl font-black text-slate-800 tracking-tight mb-2">Database Komponen</h2>
                                            <p className="text-slate-500 text-lg font-medium">Tabel komprehensif seluruh data siswa hasil ekstraksi.</p>
                                        </div>
                                    </div>
                                    <div className="flex gap-3">
                                        <button onClick={exportToExcel} className="flex items-center gap-3 bg-emerald-50 hover:bg-emerald-100 border border-emerald-200 text-emerald-800 text-sm font-black py-4 px-6 rounded-2xl transition-colors shadow-sm"><Icons.Excel className="w-5 h-5"/> Ekspor Excel</button>
                                        <button onClick={exportToPDF} className="flex items-center gap-3 bg-rose-50 hover:bg-rose-100 border border-rose-200 text-rose-800 text-sm font-black py-4 px-6 rounded-2xl transition-colors shadow-sm"><Icons.PDF className="w-5 h-5"/> Cetak PDF</button>
                                    </div>
                                </div>
                                
                                {renderFilterBar()}
                                
                                <div className="bg-white rounded-[2.5rem] shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden flex-1 flex flex-col">
                                    <div className="overflow-auto flex-1 p-0 custom-scrollbar">
                                        <table className="w-full text-left text-sm whitespace-nowrap">
                                            <thead className="bg-slate-50 text-slate-500 font-black uppercase tracking-widest text-[11px] sticky top-0 z-10 border-b border-slate-200 backdrop-blur-md bg-slate-50/95">
                                                <tr>
                                                    <th className="px-8 py-7">Identitas Siswa (NISN)</th>
                                                    <th className="px-8 py-7">Jenjang & Kelas</th>
                                                    <th className="px-8 py-7">Data Pengurus (NIK)</th>
                                                    <th className="px-8 py-7">Asal Sekolah</th>
                                                    <th className="px-8 py-7">Pendamping & Aksi</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100/80">
                                                {loadingData ? (
                                                    <tr><td colSpan="5" className="text-center py-32"><span className="loader w-12 h-12 border-[5px]"></span><div className="mt-4 font-bold text-slate-400">Mengambil data dari Google Sheets...</div></td></tr>
                                                ) : filteredKomponen.length === 0 ? (
                                                    <tr><td colSpan="5" className="text-center py-32 text-slate-400 font-black text-2xl">Tidak ada data yang sesuai filter.</td></tr>
                                                ) : (
                                                    filteredKomponen.map((item, idx) => (
                                                        <tr key={idx} className="hover:bg-brand-50/40 transition-colors group">
                                                            <td className="px-8 py-6">
                                                                <div className="font-black text-slate-800 text-lg group-hover:text-brand-700 transition-colors">{item.nama_siswa}</div>
                                                                <div className="text-xs text-slate-500 font-bold mt-2 bg-slate-50 inline-block px-2 py-1 rounded-md border border-slate-100">NISN: {item.nisn} | NIK: {item.nik_siswa}</div>
                                                            </td>
                                                            <td className="px-8 py-6">
                                                                <span className="inline-flex items-center gap-2 py-2 px-4 rounded-xl text-xs font-black bg-slate-100 text-slate-700 border border-slate-200 shadow-sm">{item.bentuk} <span className="w-1.5 h-1.5 rounded-full bg-brand-400"></span> {item.tingkat}</span>
                                                            </td>
                                                            <td className="px-8 py-6">
                                                                <div className="font-bold text-slate-700 uppercase tracking-tight">{item.nama_pengurus}</div>
                                                                <div className="text-xs text-slate-400 font-bold mt-1 font-mono tracking-wider">{item.nik_pengurus}</div>
                                                            </td>
                                                            <td className="px-8 py-6">
                                                                <div className="font-bold text-slate-800 max-w-[200px] truncate" title={item.sekolah}>{item.sekolah}</div>
                                                                <div className="text-xs text-slate-400 font-bold mt-1 flex items-center gap-1"><Icons.Archive className="w-3 h-3"/> {item.bulan} {item.tahun}</div>
                                                            </td>
                                                            <td className="px-8 py-6">
                                                                <div className="font-black text-brand-600 mb-3 flex items-center gap-1.5"><Icons.User className="w-4 h-4"/> {item.pendamping}</div>
                                                                {item.url && item.url !== '#' ? 
                                                                    <a href={item.url} target="_blank" rel="noreferrer" className="bg-white border border-slate-200 text-slate-700 py-2 px-5 rounded-xl font-bold hover:bg-slate-50 hover:border-slate-300 hover:text-brand-600 text-xs transition-all shadow-sm flex items-center gap-2 w-fit"><Icons.PDF className="w-4 h-4 text-rose-500"/> Buka PDF</a> 
                                                                    : <span className="text-xs text-slate-400 font-bold bg-slate-50 px-4 py-2 rounded-xl border border-slate-200">Mode Simulasi</span>
                                                                }
                                                            </td>
                                                        </tr>
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                    <div className="bg-slate-50 border-t border-slate-200 px-8 py-4 text-sm font-bold text-slate-500 flex justify-between">
                                        <span>Total: {filteredKomponen.length} Baris Data</span>
                                        <span>Disinkronisasi dengan Google Sheets</span>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ========================================================= */}
                        {/* 4. VIEW: DASHBOARD ARSIP (ANGKA RINGKASAN FILE FISIK)     */}
                        {/* ========================================================= */}
                        {activeTab === 'dashboard_arsip' && (
                            <div className="animate-fade-in">
                                <div className="mb-10 border-b border-slate-200 pb-6 flex items-end gap-4">
                                    <div className="bg-rose-100 p-4 rounded-2xl"><Icons.Archive className="w-8 h-8 text-rose-600" /></div>
                                    <div>
                                        <h2 className="text-4xl font-black text-slate-800 tracking-tight mb-2">Dashboard Arsip</h2>
                                        <p className="text-slate-500 text-lg font-medium">Ringkasan status dokumen form fisik yang telah dibuatkan PDF-nya.</p>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-8">
                                    {/* Card Total PDF */}
                                    <div className="bg-white border border-slate-100 rounded-[2.5rem] p-10 shadow-lg shadow-slate-200/40 flex items-center gap-8 group hover:-translate-y-1 transition-transform">
                                        <div className="w-20 h-20 rounded-[1.5rem] bg-rose-50 text-rose-500 flex items-center justify-center shrink-0 border border-rose-100 group-hover:scale-110 transition-transform">
                                            <Icons.PDF className="w-10 h-10"/>
                                        </div>
                                        <div>
                                            <div className="text-sm text-slate-400 font-black uppercase tracking-widest mb-1">Dokumen PDF</div>
                                            <div className="text-5xl font-black text-slate-800">{arsipUnik.length}</div>
                                        </div>
                                    </div>
                                    
                                    {/* Card Sekolah */}
                                    <div className="bg-white border border-slate-100 rounded-[2.5rem] p-10 shadow-lg shadow-slate-200/40 flex items-center gap-8 group hover:-translate-y-1 transition-transform">
                                        <div className="w-20 h-20 rounded-[1.5rem] bg-blue-50 text-blue-500 flex items-center justify-center shrink-0 border border-blue-100 group-hover:scale-110 transition-transform">
                                            <Icons.Archive className="w-10 h-10"/>
                                        </div>
                                        <div>
                                            <div className="text-sm text-slate-400 font-black uppercase tracking-widest mb-1">Sekolah Tervalidasi</div>
                                            <div className="text-5xl font-black text-slate-800">{totalSekolahUnik}</div>
                                        </div>
                                    </div>
                                    
                                    {/* Card Petugas */}
                                    <div className="bg-white border border-slate-100 rounded-[2.5rem] p-10 shadow-lg shadow-slate-200/40 flex items-center gap-8 group hover:-translate-y-1 transition-transform">
                                        <div className="w-20 h-20 rounded-[1.5rem] bg-emerald-50 text-emerald-500 flex items-center justify-center shrink-0 border border-emerald-100 group-hover:scale-110 transition-transform">
                                            <Icons.User className="w-10 h-10"/>
                                        </div>
                                        <div>
                                            <div className="text-sm text-slate-400 font-black uppercase tracking-widest mb-1">Petugas Terlibat</div>
                                            <div className="text-5xl font-black text-slate-800">{totalPendampingAktif}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ========================================================= */}
                        {/* 5. VIEW: ARSIP PDF DIGITAL (FILE FOLDER GRID)             */}
                        {/* ========================================================= */}
                        {activeTab === 'arsip_pdf' && (
                            <div className="animate-fade-in">
                                <div className="mb-10 border-b border-slate-200 pb-6 flex flex-col md:flex-row md:items-end justify-between gap-6">
                                    <div className="flex items-center gap-4">
                                        <div className="bg-slate-800 p-4 rounded-2xl"><Icons.PDF className="w-8 h-8 text-white" /></div>
                                        <div>
                                            <h2 className="text-4xl font-black text-slate-800 tracking-tight mb-2">Arsip File PDF</h2>
                                            <p className="text-slate-500 text-lg font-medium">Koleksi hasil scan fisik form verifikasi (Tersinkronisasi ke Google Drive).</p>
                                        </div>
                                    </div>
                                    <div className="relative w-full md:w-[28rem]">
                                        <Icons.Search className="absolute left-6 top-4.5 text-slate-400 w-5 h-5 mt-1" />
                                        <input type="text" placeholder="Cari nama sekolah atau petugas..." value={searchArsip} onChange={e => setSearchArsip(e.target.value)} className="w-full pl-16 pr-6 py-4 bg-white border-2 border-slate-200 rounded-2xl focus:ring-4 focus:ring-brand-500/20 focus:border-brand-500 outline-none transition-all text-slate-800 font-bold shadow-sm" />
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 pb-10">
                                    {loadingData ? (
                                        <div className="col-span-full text-center py-20"><span className="loader w-12 h-12"></span></div>
                                    ) : filteredArsip.length === 0 ? (
                                        <div className="col-span-full text-center py-32 bg-white rounded-[3rem] border border-dashed border-slate-300">
                                            <Icons.Archive className="w-16 h-16 text-slate-300 mx-auto mb-4" />
                                            <div className="text-2xl font-black text-slate-400">Belum ada arsip PDF ditemukan.</div>
                                        </div>
                                    ) : (
                                        filteredArsip.map((item, idx) => (
                                            <div key={idx} className="bg-white border border-slate-100 rounded-[2.5rem] p-8 hover:shadow-2xl hover:shadow-brand-500/10 hover:-translate-y-2 transition-all duration-500 flex flex-col justify-between h-full group">
                                                <div>
                                                    <div className="flex justify-between items-start mb-6">
                                                        <div className="p-4 bg-rose-50 text-rose-600 rounded-2xl group-hover:bg-rose-500 group-hover:text-white transition-colors duration-500 shadow-sm border border-rose-100 group-hover:border-rose-500"><Icons.PDF className="w-8 h-8" /></div>
                                                        <span className="text-xs bg-slate-50 border border-slate-200 text-slate-600 px-3 py-1.5 rounded-xl font-black tracking-wider uppercase">{item.bulan} {item.tahun}</span>
                                                    </div>
                                                    <h3 className="font-black text-slate-800 text-xl mb-4 leading-snug line-clamp-3 group-hover:text-brand-700 transition-colors">{item.sekolah}</h3>
                                                    <div className="text-sm text-slate-600 font-bold flex items-center gap-3 mt-4 bg-slate-50 p-3.5 rounded-xl border border-slate-100"><Icons.User className="w-4 h-4 text-brand-500"/> <span className="truncate">{item.pendamping}</span></div>
                                                </div>
                                                <div className="mt-8 pt-6 border-t border-slate-100">
                                                    {item.url && item.url !== '#' ? (
                                                        <a href={item.url} target="_blank" rel="noreferrer" className="flex items-center justify-center gap-2 w-full bg-brand-50 text-brand-700 hover:bg-brand-600 hover:text-white text-sm font-black py-4 rounded-2xl transition-colors shadow-sm group/btn">
                                                            <span>Buka PDF Dokumen</span>
                                                            <svg className="w-4 h-4 group-hover/btn:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                                                        </a>
                                                    ) : (
                                                        <button disabled className="block text-center w-full bg-slate-50 border border-slate-200 text-slate-400 text-sm font-black py-4 rounded-2xl cursor-not-allowed">Hanya Simulasi Lokal</button>
                                                    )}
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        // Render aplikasi ke DOM
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
